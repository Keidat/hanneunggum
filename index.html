<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국사능력검정시험 심화 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0f0c;
  --surface: #121a15;
  --card: #182018;
  --border: #2a3a2e;
  --gold: #4caa78;
  --gold-light: #7dd4a8;
  --gold-dim: rgba(76,170,120,0.15);
  --red: #c94c4c;
  --red-dim: rgba(201,76,76,0.12);
  --green: #5cc48a;
  --green-dim: rgba(92,196,138,0.12);
  --text: #d8ede0;
  --text-muted: #607060;
  --text-dim: #405040;
  --selected: rgba(76,170,120,0.22);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── START SCREEN ── */
#start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative}
#start-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(76,170,120,0.07) 0%,transparent 70%);pointer-events:none}
.title-badge{font-family:'Noto Serif KR',serif;font-size:.72rem;letter-spacing:.25em;color:var(--gold);border:1px solid rgba(76,170,120,0.35);padding:.4rem 1.2rem;margin-bottom:2rem;text-transform:uppercase}
.main-title{font-family:'Noto Serif KR',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;text-align:center;line-height:1.25;margin-bottom:.5rem;background:linear-gradient(160deg,#d8ede0 0%,#4caa78 60%,#2e7a52 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.main-sub{color:var(--text-muted);font-size:.9rem;text-align:center;margin-bottom:2.5rem;line-height:1.8}
.info-row{display:flex;gap:1.5rem;margin-bottom:2.5rem;flex-wrap:wrap;justify-content:center}
.info-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem 1.2rem;font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:.5rem}
.info-chip strong{color:var(--gold);font-weight:700}
.range-label{font-size:.78rem;letter-spacing:.1em;color:var(--text-muted);margin-bottom:.8rem;text-align:center}
.range-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;width:100%;max-width:680px;margin-bottom:.7rem}
.range-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text-muted);padding:.8rem .5rem;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.78rem;text-align:center;transition:all .2s;line-height:1.5;user-select:none}
.range-btn:hover{border-color:var(--gold);color:var(--text)}
.range-btn.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-light)}
.range-btn .era{font-size:.65rem;color:var(--text-dim);display:block;margin-top:.2rem}
.range-btn.active .era{color:rgba(125,212,168,0.6)}
.select-all-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text-muted);padding:.6rem 1.5rem;border-radius:8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.78rem;width:100%;max-width:680px;margin-bottom:1.2rem;transition:all .2s;text-align:center}
.select-all-btn:hover{border-color:var(--gold);color:var(--text)}
.select-all-btn.all-active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-light)}
.range-hint{font-size:.72rem;color:var(--text-dim);text-align:center;margin-bottom:1.5rem}
.btn-start{background:linear-gradient(135deg,#4caa78,#2e7a52);color:#0a0f0c;border:none;padding:1rem 3.5rem;border-radius:10px;font-size:1rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.05em;opacity:.4;pointer-events:none}
.btn-start.ready{opacity:1;pointer-events:auto}
.btn-start.ready:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(76,170,120,0.3)}

/* ── QUIZ SCREEN ── */
#quiz-screen{display:none;max-width:780px;margin:0 auto;padding:1.5rem 1.2rem 6rem}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.q-counter{font-size:.82rem;color:var(--text-muted);letter-spacing:.05em}
.q-counter em{color:var(--gold);font-style:normal;font-size:1.1rem;font-weight:700}
.score-pill{background:var(--card);border:1px solid var(--border);color:var(--green);font-size:.78rem;font-weight:700;padding:.3rem .8rem;border-radius:100px}
.progress-wrap{height:3px;background:var(--border);border-radius:99px;margin-bottom:1.8rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#4caa78,#7dd4a8);border-radius:99px;transition:width .4s ease}
.q-range-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--gold);margin-bottom:.7rem;text-transform:uppercase}
.q-range-badge::before{content:'';display:block;width:5px;height:5px;background:var(--gold);border-radius:50%}
.q-source{font-size:.62rem;color:var(--text-dim);margin-left:.3rem;font-weight:400;letter-spacing:0}
.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.6rem;margin-bottom:1.2rem;position:relative;overflow:hidden}
.question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#4caa78,#2e7a52)}
.source-box{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:8px;padding:.9rem 1rem;margin-bottom:1rem;font-size:.83rem;color:var(--text-muted);line-height:1.8;font-style:italic}
.source-box strong{color:var(--text);font-style:normal}
.q-text{font-size:1rem;font-weight:500;line-height:1.75;color:var(--text)}
.choices{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1rem}
.choice-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:.85rem 1rem;border-radius:9px;text-align:left;font-size:.9rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:.75rem;line-height:1.55}
.choice-btn:hover:not(:disabled):not(.selected){border-color:var(--gold);background:var(--gold-dim)}
.choice-btn.selected{border-color:var(--gold);background:var(--selected);color:var(--text)}
.choice-btn.selected .choice-num{background:var(--gold);color:#0a0f0c}
.choice-btn.correct{background:var(--green-dim);border-color:var(--green);color:var(--text)}
.choice-btn.correct .choice-num{background:var(--green);color:#fff}
.choice-btn.wrong{background:var(--red-dim);border-color:var(--red);color:var(--text)}
.choice-btn.wrong .choice-num{background:var(--red);color:#fff}
.choice-btn:disabled{cursor:default}
.choice-num{min-width:26px;height:26px;border-radius:6px;background:var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px;transition:all .15s}
/* confirm button */
.btn-confirm{width:100%;background:linear-gradient(135deg,#4caa78,#2e7a52);color:#0a0f0c;border:none;padding:.9rem;border-radius:11px;font-size:.95rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;margin-bottom:.9rem;letter-spacing:.05em;opacity:.4;pointer-events:none}
.btn-confirm.ready{opacity:1;pointer-events:auto}
.btn-confirm.ready:hover{opacity:.9;transform:translateY(-1px)}
/* explanation */
.explanation{display:none;background:rgba(76,170,120,0.05);border:1px solid rgba(76,170,120,0.2);border-radius:9px;padding:1rem 1.1rem;font-size:.85rem;color:#8acca8;line-height:1.8;margin-bottom:1.2rem}
.exp-label{font-weight:700;color:var(--gold);margin-bottom:.4rem;display:block;font-size:.72rem;letter-spacing:.1em}
.exp-wrong-note{color:var(--red);font-size:.8rem;margin-bottom:.5rem;display:block}
.exp-correct-note{color:var(--green);font-size:.8rem;margin-bottom:.5rem;display:block}
.exp-detail{color:#8acca8;font-size:.84rem;line-height:1.85}
/* next button */
.btn-next{width:100%;background:var(--card);color:var(--text);border:1.5px solid var(--border);padding:.9rem;border-radius:11px;font-size:.9rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;display:none;letter-spacing:.05em}
.btn-next:hover{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-light)}

/* ── RESULT SCREEN ── */
#result-screen{display:none;max-width:580px;margin:0 auto;padding:3rem 1.5rem;text-align:center;min-height:100vh;align-items:center;justify-content:center;flex-direction:column}
.result-icon{font-size:4.5rem;margin-bottom:1rem;display:block}
.result-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:900;margin-bottom:.5rem}
.result-score{font-size:4rem;font-weight:900;margin:1rem 0;font-family:'Noto Serif KR',serif}
.score-num{color:var(--gold)}
.score-denom{font-size:1.5rem;color:var(--text-muted)}
.result-msg{color:var(--text-muted);font-size:.92rem;margin-bottom:2rem;line-height:1.8;white-space:pre-line}
.bar-section{width:100%;max-width:380px;margin:0 auto 2rem;display:flex;flex-direction:column;gap:.7rem}
.bar-row{display:flex;align-items:center;gap:.7rem;font-size:.82rem}
.bar-label{width:45px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:9px;background:var(--border);border-radius:99px;overflow:hidden}
.bar-correct{height:100%;background:var(--green);border-radius:99px;transition:width 1s ease}
.bar-wrong{height:100%;background:var(--red);border-radius:99px;transition:width 1s ease}
.bar-count{width:28px;font-weight:700;text-align:left}
.result-btns{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center}
.btn-r{border:none;padding:.85rem 1.5rem;border-radius:10px;font-size:.88rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;letter-spacing:.03em}
.btn-r:hover{opacity:.85}
.btn-r.retry{background:linear-gradient(135deg,#4caa78,#2e7a52);color:#0a0f0c}
.btn-r.home{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-r.home:hover{border-color:var(--gold)}
.score-excellent .score-num{color:#7dd4a8}
.score-good .score-num{color:var(--green)}
.score-ok .score-num{color:#4caa78}
.score-low .score-num{color:var(--red)}
@media(max-width:520px){
  .range-grid{grid-template-columns:repeat(2,1fr)}
  .q-text{font-size:.92rem}
  .choice-btn{font-size:.83rem;padding:.75rem .85rem}
}
</style>
</head>
<body>

<!-- ══════════════════ START ══════════════════ -->
<div id="start-screen">
  <div class="title-badge">📜 심화 대비</div>
  <h1 class="main-title">한국사능력검정시험<br>심화 실력 점검</h1>
  <p class="main-sub">74~77회 기출 + 출제 예상 문제<br>78회 목표 점수 90점 이상 달성을 위한 집중 훈련</p>
  <div class="info-row">
    <div class="info-chip">🎯 <strong>50문제</strong> / 회차</div>
    <div class="info-chip">📚 <strong>5지선다</strong> 객관식</div>
    <div class="info-chip">💡 <strong>상세</strong> 해설 제공</div>
  </div>
  <p class="range-label">공부할 범위를 선택하세요 (중복 선택 가능 · 최소 1개)</p>
  <div class="range-grid">
    <button class="range-btn" data-range="0" onclick="toggleRange(0)">① 선사시대<span class="era">구석기~청동기</span></button>
    <button class="range-btn" data-range="1" onclick="toggleRange(1)">② 고조선·여러나라<span class="era">고조선·삼한·부여</span></button>
    <button class="range-btn" data-range="2" onclick="toggleRange(2)">③ 삼국시대<span class="era">고구려·백제·신라</span></button>
    <button class="range-btn" data-range="3" onclick="toggleRange(3)">④ 통일신라·발해<span class="era">남북국 시대</span></button>
    <button class="range-btn" data-range="4" onclick="toggleRange(4)">⑤ 고려<span class="era">918~1392</span></button>
    <button class="range-btn" data-range="5" onclick="toggleRange(5)">⑥ 조선<span class="era">1392~1863</span></button>
    <button class="range-btn" data-range="6" onclick="toggleRange(6)">⑦ 개화기<span class="era">1863~1910</span></button>
    <button class="range-btn" data-range="7" onclick="toggleRange(7)">⑧ 일제강점기<span class="era">1910~1945</span></button>
    <button class="range-btn" data-range="8" onclick="toggleRange(8)">⑨ 광복~현대<span class="era">1945~현재</span></button>
  </div>
  <button class="select-all-btn" id="select-all-btn" onclick="toggleSelectAll()">☑ 전체 선택</button>
  <p class="range-hint" id="range-hint">범위를 선택하면 시작할 수 있습니다</p>
  <button class="btn-start" id="btn-start" onclick="startQuiz()">시험 시작하기 →</button>
</div>

<!-- ══════════════════ QUIZ ══════════════════ -->
<div id="quiz-screen">
  <div class="quiz-top">
    <div class="q-counter">문제 <em id="cur-q">1</em> / 50</div>
    <div class="score-pill">점수 <span id="live-score">0</span>점</div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="prog-fill" style="width:2%"></div></div>
  <div class="question-card" id="q-card">
    <div class="q-range-badge" id="q-range-badge">선사시대 <span class="q-source" id="q-src"></span></div>
    <div class="source-box" id="q-srcbox" style="display:none"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div id="choices-area"></div>
  <button class="btn-confirm" id="btn-confirm" onclick="confirmAnswer()">정답 확인하기</button>
  <div class="explanation" id="explanation">
    <span class="exp-label">💡 해설</span>
    <span id="exp-wrong-note" class="exp-wrong-note" style="display:none"></span>
    <span id="exp-correct-note" class="exp-correct-note" style="display:none"></span>
    <span id="exp-text" class="exp-detail"></span>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- ══════════════════ RESULT ══════════════════ -->
<div id="result-screen">
  <span class="result-icon" id="res-icon">🏆</span>
  <h2 class="result-title" id="res-title">수고했습니다!</h2>
  <div class="result-score" id="res-score-wrap">
    <span class="score-num" id="res-score">0</span>
    <span class="score-denom"> / 50</span>
  </div>
  <p class="result-msg" id="res-msg"></p>
  <div class="bar-section">
    <div class="bar-row">
      <span class="bar-label" style="color:var(--green)">정답</span>
      <div class="bar-track"><div class="bar-correct" id="bar-c" style="width:0%"></div></div>
      <span class="bar-count" style="color:var(--green)" id="bc-cnt">0</span>
    </div>
    <div class="bar-row">
      <span class="bar-label" style="color:var(--red)">오답</span>
      <div class="bar-track"><div class="bar-wrong" id="bar-w" style="width:0%"></div></div>
      <span class="bar-count" style="color:var(--red)" id="bw-cnt">0</span>
    </div>
  </div>
  <div class="result-btns">
    <button class="btn-r retry" onclick="startQuiz()">🔄 다시 풀기</button>
    <button class="btn-r home" onclick="goHome()">🏠 범위 선택</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════
   문제 은행
   r: 범위(0~8), src: 출처, q: 문제, choices: 보기[5개], answer: 정답인덱스(0~4), exp: 완벽해설
═══════════════════════════════════════════════ */
const QUESTIONS = [

/* ━━━━━━━━━━━━ ① 선사시대 ━━━━━━━━━━━━ */
// 기출
{r:0,src:'74회 1번',q:'다음 자료에서 (가) 시대의 생활 모습으로 가장 적절한 것은?\n[서울 암사동 유적 발견 100주년 기념, 빗살무늬 토기·갈돌·갈판 출토, 유구인 집터 발견]',choices:['목책과 환호 등 방어 시설을 갖추었다.','소를 이용한 깊이갈이가 일반화되었다.','농경과 목축을 통해 식량을 생산하였다.','지배층의 무덤으로 고인돌을 축조하였다.','거푸집을 이용하여 세형 동검을 제작하였다.'],answer:2,exp:'암사동 유적은 신석기 시대의 대표 유적입니다. 빗살무늬 토기는 신석기 시대 표준 유물이며, 갈돌과 갈판은 곡물을 갈아 먹는 데 사용된 신석기 시대 도구입니다. 신석기 시대에는 농경(조·피 등 잡곡)과 목축이 시작되어 이전 시대(구석기)와 달리 식량 생산이 이루어졌습니다. ①목책·환호는 청동기 시대 방어 취락 특징, ②소 깊이갈이는 삼국~통일신라 시대, ④고인돌은 청동기 시대 지배층 무덤, ⑤세형동검·거푸집은 초기 철기 시대 유물입니다.'},
{r:0,src:'75회 1번',q:'다음 초대장의 (가) 시대 생활 모습으로 가장 적절한 것은?\n[부여 송국리 유적 발굴 50주년, "사유 재산과 계급이 발생한 이 시대", 송국리형 토기·비파형 동검 출토]',choices:['주먹도끼 등 뗀석기를 처음 제작하였다.','소를 이용한 깊이갈이가 널리 보급되었다.','주로 강가의 동굴이나 막집에 거주하였다.','많은 인력을 동원하여 고인돌을 축조하였다.','가락바퀴를 이용하여 실을 뽑기 시작하였다.'],answer:3,exp:'송국리 유적은 청동기 시대의 대표 유적으로, 비파형 동검·민무늬 토기·반달 돌칼이 특징입니다. 문제 지문에서 "사유재산과 계급이 발생"하였다고 명시하였는데, 이는 청동기 시대의 핵심 특징입니다. 계급이 발생하면서 지배층은 권력을 과시하기 위해 수십 톤에 달하는 고인돌을 축조하였습니다. ①뗀석기 제작은 구석기 시대, ②소 깊이갈이는 삼국 이후, ③동굴·막집 거주는 구석기 시대, ⑤가락바퀴 실 뽑기는 신석기 시대입니다.'},
{r:0,src:'76회 1번',q:'연천 전곡리 출토 주먹도끼와 관련된 이 시대의 생활 모습으로 옳은 것은?',choices:['민무늬 토기에 식량을 저장하였다.','가락바퀴를 이용하여 실을 만들었다.','명도전, 반량전 등 화폐를 사용하였다.','철제 농기구를 사용하여 농사를 지었다.','주로 동굴이나 강가의 막집에 거주하였다.'],answer:4,exp:'전곡리 주먹도끼는 구석기 시대의 대표 유물로, 이 발견으로 동아시아에도 아슐리안 계통의 양면 석기가 존재함이 밝혀졌습니다. 구석기 시대 사람들은 정착하지 못하고 이동 생활을 하며 주로 동굴이나 강가에 막집을 지어 거주했습니다. ①민무늬 토기는 청동기, ②가락바퀴는 신석기, ③명도전·반량전은 철기 시대(중국과 교역), ④철제 농기구는 철기~삼국 시대입니다.'},
{r:0,src:'77회 1번',q:'여주 흔암리 유적 체험 프로그램(민무늬 토기 조각 맞추기, 반달 돌칼로 벼 이삭 수확하기, 탄화미 찾아보기)이 안내하는 이 시대의 생활 모습으로 가장 적절한 것은?',choices:['철제 무기로 정복 활동을 벌였다.','소를 이용한 깊이갈이가 일반화되었다.','많은 인력을 동원하여 고인돌을 축조하였다.','주먹도끼, 찍개 등의 뗀석기를 처음 제작하였다.','가락바퀴와 뼈바늘을 이용하여 옷을 만들기 시작하였다.'],answer:2,exp:'흔암리 유적은 청동기 시대 대표 유적입니다. 반달 돌칼은 벼 이삭을 낫처럼 수확하는 청동기 시대 전용 농기구이며, 민무늬 토기·탄화미도 청동기 시대 유물입니다. 청동기 시대에는 사유재산과 계급이 발생하고, 지배층의 권력을 상징하는 고인돌이 만들어졌습니다. 고인돌은 수십~수백 명의 인력이 동원되어야 축조 가능한 거대 무덤입니다. ①철제 무기는 철기 시대, ②소 깊이갈이는 삼국 이후, ④뗀석기는 구석기, ⑤가락바퀴·뼈바늘은 신석기입니다.'},

{r:0,src:'예상',q:'신석기 시대에 나타난 변화로 옳은 것을 모두 고른 것은?',choices:['이동 생활에서 정착 생활로 변화하였다.','지배층과 피지배층의 신분 분화가 나타났다.','식량 저장을 위해 빗살무늬 토기를 제작하였다.','ㄱ과 ㄷ','ㄱ, ㄴ, ㄷ 모두'],answer:3,exp:'신석기 시대(약 1만 년 전~기원전 2000년경)에는 농경과 목축이 시작되어 정착 생활(강가·해안 근처)이 이루어졌습니다(ㄱ). 또한 빗살무늬 토기를 만들어 식량을 저장하였습니다(ㄷ). 그러나 신석기 시대는 아직 평등한 공동체 사회로, 지배층과 피지배층의 신분 분화는 청동기 시대에 나타납니다(ㄴ 오답). 대표 유적은 서울 암사동, 부산 동삼동, 제주 고산리입니다.'},
{r:0,src:'예상',q:'청동기 시대 유물로 옳지 않은 것은?',choices:['비파형 동검','반달 돌칼','민무늬 토기','고인돌','빗살무늬 토기'],answer:4,exp:'빗살무늬 토기는 신석기 시대의 대표 유물입니다. 겉면에 생선 뼈 모양의 빗살 문양이 새겨져 있으며, 식량 저장에 이용되었습니다. 청동기 시대의 대표 유물은 비파형 동검(요령식 동검), 반달 돌칼(수확 도구), 민무늬 토기, 고인돌(지배층 무덤), 탁자식·바둑판식·개석식 고인돌 등입니다. 세형 동검은 청동기 시대 후기~초기 철기 시대 유물입니다.'},
{r:0,src:'예상',q:'철기 시대의 특징으로 옳은 것은?',choices:['주먹도끼와 찍개 등의 뗀석기를 처음 만들었다.','사회가 평등하고 계급이 없었다.','명도전·반량전 등 중국 화폐가 사용되었다.','빗살무늬 토기를 만들어 식량을 저장하였다.','비파형 동검으로 무장한 군장이 등장하였다.'],answer:2,exp:'철기 시대(기원전 300년경부터)에는 철제 농기구와 철제 무기가 보급되어 생산력이 크게 향상되었습니다. 이 시기에는 중국과 교역이 활발하여 연나라의 명도전, 진·한나라의 반량전 등 중국 화폐가 한반도에서 사용되었습니다. 이는 당시 활발한 교역 관계를 보여줍니다. 또한 세형 동검, 거푸집, 잔무늬 거울도 이 시기 대표 유물입니다. ①뗀석기는 구석기, ②평등한 사회는 신석기, ④빗살무늬 토기는 신석기, ⑤비파형 동검은 청동기입니다.'},
{r:0,src:'예상',q:'다음 유물과 관련된 시대를 바르게 연결한 것은?',choices:['주먹도끼 – 신석기 / 빗살무늬 토기 – 청동기','주먹도끼 – 구석기 / 빗살무늬 토기 – 신석기','비파형 동검 – 신석기 / 민무늬 토기 – 청동기','가락바퀴 – 청동기 / 반달 돌칼 – 철기','고인돌 – 신석기 / 세형 동검 – 청동기'],answer:1,exp:'각 유물의 시대 대응: 주먹도끼(구석기·뗀석기), 빗살무늬 토기(신석기), 비파형 동검(청동기), 민무늬 토기(청동기), 반달 돌칼(청동기), 가락바퀴(신석기·실 뽑기), 고인돌(청동기·지배층 무덤), 세형 동검(초기 철기 시대). 이 연결을 반드시 암기해야 합니다.'},
{r:0,src:'예상',q:'신석기 시대 사람들이 강가나 해안 근처에 정착하여 마을을 이룬 가장 직접적인 이유는?',choices:['방어에 유리한 지형이기 때문이다.','청동 제련에 물이 필요했기 때문이다.','농경과 어로·채집을 병행하기에 적합했기 때문이다.','중국과의 교역로를 확보하기 위해서이다.','지배층이 백성을 통제하기 위해 집중 배치했기 때문이다.'],answer:2,exp:'신석기 시대에는 강가나 해안 근처에 마을을 형성하였는데, 이는 ①강에서 물고기와 조개 등 어로 활동이 가능하고, ②강 주변 충적지에서 원시 농경(조·피 등)이 가능하며, ③숲에서 채집도 용이하기 때문입니다. 즉 식량 확보에 유리한 복합적 생업 환경이 주된 이유입니다. 신석기 시대는 방어 목적의 취락이나 중국 교역, 지배층 통제 등과 관련이 없습니다.'},

{r:0,src:'예상',q:'다음 중 시대 순서가 바르게 나열된 것은?',choices:['청동기 → 신석기 → 구석기 → 철기','구석기 → 청동기 → 신석기 → 철기','구석기 → 신석기 → 청동기 → 철기','신석기 → 구석기 → 철기 → 청동기','신석기 → 청동기 → 구석기 → 철기'],answer:2,exp:'선사 시대 순서: 구석기 시대(약 70만 년 전~1만 년 전) → 신석기 시대(약 1만 년 전~기원전 2000년경) → 청동기 시대(기원전 2000년경~기원전 400년경) → 철기 시대(기원전 400년경~). 각 시대 핵심 특징: 구석기(뗀석기·이동생활), 신석기(간석기·농경·빗살무늬토기), 청동기(계급·고인돌·비파형동검), 철기(철제농기구·명도전).'},
{r:0,src:'예상',q:'청동기 시대에 사유재산과 계급이 발생한 이유로 가장 적절한 것은?',choices:['청동 무기를 독점한 자가 다른 집단을 지배하면서 계급이 생겨났다.','신석기 시대부터 이미 계급이 존재했으며 청동기에 강화되었다.','중국에서 유입된 계급 제도를 수용하면서 형성되었다.','종교 지도자인 천군이 모든 재산을 독점하였다.','철제 농기구 보급으로 잉여 생산물이 축적되었기 때문이다.'],answer:0,exp:'청동기 시대에는 벼농사 등 생산력이 향상되어 잉여 생산물이 생기고, 이를 축적한 자와 그렇지 못한 자 사이에 경제적 격차가 발생했습니다. 또한 청동제 무기(비파형 동검 등)를 가진 군사 지도자가 등장하여 다른 집단을 지배하면서 계급이 형성되었습니다. 이 지배층이 바로 고인돌에 묻힌 군장(족장)입니다. 철제 농기구는 철기 시대의 특징이며, 신석기 시대는 평등한 공동체 사회였습니다.'},

/* ━━━━━━━━━━━━ ② 고조선·여러나라 ━━━━━━━━━━━━ */
// 기출
{r:1,src:'74회 2번',q:'강화 참성단은 단군왕검이 하늘에 제사를 지낸 제단이라고 전합니다. 이 나라에 대한 설명으로 옳은 것은?',choices:['여러 가(加)들이 사출도를 다스렸다.','동맹이라는 제천 행사를 개최하였다.','민며느리제라는 혼인 풍습이 있었다.','읍락 간의 경계를 중시하는 책화가 있었다.','왕 아래 상, 대부, 장군 등의 관직을 두었다.'],answer:4,exp:'강화 참성단은 단군왕검이 제사를 지낸 곳이라 전하므로, 이 나라는 고조선입니다. 고조선은 왕 아래 상(相)·대부(大夫)·장군 등의 관직을 두어 체계적인 지배 구조를 갖추었습니다. ①사출도는 부여의 4가(마가·우가·저가·구가)가 관할하는 지역, ②동맹은 고구려의 제천 행사(10월), ③민며느리제는 옥저의 혼인 풍습, ④책화는 동예에서 읍락 간 경계를 어기면 노비·소·말로 배상하는 풍습입니다.'},
{r:1,src:'76회 2번',q:'다음 검색 결과(5부 중 계루부에서 왕이 나오다 / 왕 아래 상가·대로·패자 등의 관직 / 혼인할 때 여자 집에 서옥을 짓다)에 해당하는 국가에 대한 설명으로 가장 적절한 것은?',choices:['신성 구역인 소도가 존재하였다.','10월에 동맹이라는 제천 행사를 열었다.','읍락 간의 경계를 중시하는 책화가 있었다.','사회 질서 유지를 위해 범금 8조를 두었다.','화백 회의에서 국가의 중대사를 결정하였다.'],answer:1,exp:'계루부에서 왕이 배출되고, 상가·대로·패자 등의 관직, 서옥제(데릴사위제)는 모두 고구려의 특징입니다. 고구려는 10월에 동맹(東盟)이라는 제천 행사를 열어 하늘에 제사를 지냈습니다. ①소도는 삼한의 신성 구역, ③책화는 동예의 풍습, ④범금 8조는 고조선의 법, ⑤화백 회의는 신라의 귀족 회의입니다. 고구려에는 제가 회의(대가들의 귀족 회의)가 있었습니다.'},
{r:1,src:'77회 2번',q:'한의 사신 섭하가 (가) 나라의 비왕을 살해한 사건으로 전쟁이 시작되었으며, 우거왕이 맞서 싸웠습니다. (가) 나라에 대한 설명으로 옳은 것은?',choices:['민며느리제라는 혼인 풍습이 있었다.','국가 중대사를 정사암에서 논의하였다.','여러 가(加)들이 별도로 사출도를 주관하였다.','지방의 여러 성에 욕살, 처려근지 등을 두었다.','사회 질서를 유지하기 위해 범금 8조를 만들었다.'],answer:4,exp:'우거왕은 고조선의 마지막 왕으로, 섭하 사건이 발단이 되어 한 무제의 대규모 침략을 받았습니다(기원전 109~108년). 고조선은 8조법(범금 8조)으로 사회 질서를 유지하였는데, 현재 전해지는 3조항은: ①살인자는 사형, ②남에게 상처를 입힌 자는 곡물로 배상, ③도둑질한 자는 노비로 삼음(용서받으려면 50만 전 납부). ①민며느리제는 옥저, ②정사암은 백제 재상 회의 장소, ③사출도는 부여, ④욕살·처려근지는 고구려 지방관입니다.'},
{r:1,src:'77회 3번',q:'단궁·과하마·반어피가 특산물이고 10월에 무천을 열며 호랑이를 신으로 여기는 나라의 탐구 활동으로 가장 적절한 것은?',choices:['진대법의 시행 목적을 파악한다.','책화의 사회적 의미를 조사한다.','신성 구역인 소도의 기능을 알아본다.','화백 회의의 의사 결정 방식을 살펴본다.','포상 8국 전쟁이 전개되는 과정을 찾아본다.'],answer:1,exp:'단궁(활), 과하마(키 작은 말), 반어피(가죽), 무천(10월 제천 행사), 호랑이 숭배는 모두 동예의 특징입니다. 동예에는 책화(責禍)라는 독특한 풍습이 있어 다른 읍락의 경계를 침범하면 노비·소·말로 배상해야 했습니다. 이는 폐쇄적인 읍락 사회의 특성을 보여줍니다. ①진대법은 고구려 고국천왕의 빈민 구제 정책, ③소도는 삼한, ④화백 회의는 신라, ⑤포상 8국 전쟁은 가야 관련 사건입니다.'},
// 예상
{r:1,src:'예상',q:'부여의 특징으로 옳은 것은?',choices:['10월에 무천이라는 제천 행사를 열었다.','12월에 영고라는 제천 행사를 열었다.','신성 구역인 소도와 천군이 있었다.','혼인 풍습으로 민며느리제가 있었다.','동맹이라는 제천 행사를 10월에 열었다.'],answer:1,exp:'부여는 만주(지금의 중국 동북부)에 위치한 국가로, 12월에 영고(迎鼓)라는 제천 행사를 열었습니다. 부여의 주요 특징: 5부(중앙+4부), 4가(마가·우가·저가·구가)가 각자 사출도를 관할, 1책 12법(엄격한 형법), 순장(왕이 죽으면 종자를 함께 매장) 풍습. ①무천은 동예(10월), ③소도·천군은 삼한, ④민며느리제는 옥저, ⑤동맹은 고구려(10월)입니다.'},
{r:1,src:'예상',q:'삼한에 대한 설명으로 옳지 않은 것은?',choices:['마한·진한·변한으로 구성되었다.','5월과 10월에 계절제를 지냈다.','신지·읍차 등의 군장이 다스렸다.','천군이라는 제사장이 소도를 관할하였다.','민며느리제라는 혼인 풍습이 있었다.'],answer:4,exp:'민며느리제는 옥저의 혼인 풍습입니다. 어린 여자아이를 남자 집에 데려다 키우다가 성인이 되면 혼인시키는 제도입니다. 삼한의 특징: ①마한(54개국)·진한(12개국)·변한(12개국), ②5월(씨뿌리기)·10월(추수감사)에 계절제 개최, ③군장(신지·읍차·부례·살해·읍차 등), ④천군이라는 제사장이 소도(신성 구역)를 관할—소도에 들어간 죄인도 잡지 못하였습니다. 삼한은 나중에 마한→백제, 진한→신라, 변한→가야로 발전합니다.'},
{r:1,src:'예상',q:'옥저의 특징으로 옳은 것을 모두 고른 것은?',choices:['민며느리제와 골장제가 있었다.','읍군·삼로가 다스렸다.','동맹이라는 제천 행사를 열었다.','ㄱ과 ㄴ','ㄱ, ㄴ, ㄷ 모두'],answer:3,exp:'옥저의 특징: ①민며느리제(혼인 풍습—어릴 때 남자 집에서 성장 후 결혼), ②골장제(장례 풍습—가족이 죽으면 가매장 후 뼈를 추려 가족 공동 목곽에 안치), ③읍군·삼로라는 지배자가 있었으나 고구려의 지배를 받음, ④해산물이 풍부하여 고구려에 공납. 동맹은 고구려의 제천 행사입니다. 옥저는 함흥 평야 일대에 위치하였으며 고구려에 복속되어 독자적 발전이 제한되었습니다.'},
{r:1,src:'예상',q:'고조선의 8조법 중 현재 전해지는 3개 조항에 포함되지 않는 것은?',choices:['사람을 죽인 자는 즉시 사형에 처한다.','남에게 상처를 입힌 자는 곡물로 배상한다.','도둑질한 자는 노비로 삼는다.','간음한 자는 중형에 처한다.','도적이 되기 싫어 속전을 내려 해도 50만 전을 내야 한다.'],answer:3,exp:'고조선 8조법 전체 8개 조항 중 현재까지 전해지는 3개: ①살인죄—사형, ②상해죄—곡물로 배상, ③절도죄—노비로 삼음(용서받으려면 50만 전). ④간음한 자에 대한 규정은 전해지는 3개 조항에 포함되지 않습니다. 이 3개 조항을 통해 고조선이 생명·재산·노동력을 중시하는 사회였음을 알 수 있습니다.'},
{r:1,src:'예상',q:'위만 조선에 대한 설명으로 옳은 것은?',choices:['단군왕검이 건국하였다.','철기 문화를 바탕으로 세력을 확장하였다.','범금 8조를 처음으로 제정하였다.','한과 원만한 외교 관계를 유지하였다.','독자적인 청동기 문화를 보유하였다.'],answer:1,exp:'위만 조선(기원전 194년~기원전 108년): 위만은 중국 연나라 사람으로, 고조선으로 망명하여 준왕을 몰아내고 왕위에 올랐습니다. 위만 조선은 철기 문화를 기반으로 발전하여 한반도 남부의 진국(辰國) 등 주변 세력을 복속시키고 중계 무역으로 이익을 취하였습니다. 이에 위협을 느낀 한 무제가 기원전 109년 대규모 침략을 시작하여 기원전 108년 왕검성이 함락되며 멸망하였습니다. 범금 8조는 고조선 전체의 법이며, 위만 이전부터 존재했습니다.'},
{r:1,src:'예상',q:'고구려의 제가 회의에 대한 설명으로 옳은 것은?',choices:['6두품 이하 귀족이 참여하는 회의였다.','대가(大加)들이 국가 중대사를 결정하는 귀족 회의였다.','삼한에서 신지와 읍차가 참여한 회의였다.','고려의 도병마사와 동일한 성격의 기구였다.','부여의 영고 행사 때 열리는 회의였다.'],answer:1,exp:'고구려 제가 회의는 왕 아래 상가(相加)·고추가(古鄒加) 등의 대가(大加)들이 모여 국가 중대사를 결정하는 귀족 회의입니다. 반역·살인 등 중요 범죄를 처리할 때도 활용되었으며, 이는 고구려 지배층의 귀족적 성격을 보여줍니다. 신라의 화백 회의(진골 귀족 합의제), 백제의 정사암 회의와 유사한 성격입니다. 고려 도병마사는 고려 시대 국방·군사 문제를 논의하던 기구로 성격이 다릅니다.'},
{r:1,src:'예상',q:'다음 나라에 대한 설명을 바르게 짝지은 것은?',choices:['부여-무천(10월), 고구려-영고(12월), 동예-동맹(10월)','부여-영고(12월), 고구려-동맹(10월), 동예-무천(10월)','부여-동맹(10월), 고구려-무천(10월), 동예-영고(12월)','부여-무천(10월), 고구려-동맹(10월), 동예-영고(12월)','부여-영고(12월), 고구려-무천(10월), 동예-동맹(10월)'],answer:1,exp:'각 나라의 제천 행사: 부여-영고(迎鼓, 12월), 고구려-동맹(東盟, 10월), 동예-무천(舞天, 10월), 삼한-계절제(5월·10월). 암기법: "부영(12), 고동(10), 동무(10)". 이 제천 행사들은 농사의 풍요와 하늘에 감사하는 의미를 담고 있으며, 한국사능력검정시험에 매우 자주 출제되는 핵심 내용입니다.'},
{r:1,src:'예상',q:'삼한 사회의 특징으로 옳지 않은 것은?',choices:['천군이 다스리는 소도라는 신성 구역이 있었다.','군장 세력과 천군의 권한이 분리되어 있었다.','변한에서는 철이 많이 생산되어 낙랑·왜에 수출하였다.','골장제라는 독특한 장례 풍습이 있었다.','마한에서 백제가, 진한에서 신라가 성장하였다.'],answer:3,exp:'골장제는 옥저의 장례 풍습으로 삼한과 무관합니다. 삼한 특징: ①소도—천군이 관할하는 신성 구역, 군장도 잡지 못하는 불가침 구역, ②군장(신지·읍차)과 천군(제사장)의 역할 분리—제정 분리, ③변한의 철 생산—낙랑·왜(일본)에 수출, 화폐처럼 사용, ④마한→백제, 진한→신라, 변한→가야로 발전. 소도의 존재는 고대 한국 사회에서 제정 분리가 이루어졌음을 보여주는 중요한 사례입니다.'},

/* ━━━━━━━━━━━━ ③ 삼국시대 ━━━━━━━━━━━━ */
// 기출
{r:2,src:'74회 3번',q:'장군총은 (가)의 대표적인 무덤입니다. 다듬은 돌을 계단처럼 쌓아 높이 약 13미터. (가) 국가에서 볼 수 있는 모습으로 가장 적절한 것은?',choices:['녹과전을 지급받는 관리','경당에서 수련하는 청년','팔만대장경판을 만드는 장인','지방의 22담로에 파견되는 왕족','황룡사 구층 목탑의 축조를 건의하는 승려'],answer:1,exp:'장군총은 고구려의 대표 계단식 돌무지무덤(적석총)으로 5세기 장수왕 때 축조된 것으로 추정됩니다. 고구려에는 경당(扃堂)이 있어 지방의 청소년들이 독서·활쏘기 등을 배웠습니다. 이는 고구려의 대표적 교육 기관입니다. ①녹과전은 고려 시대 관리 토지 제도, ③팔만대장경은 고려, ④22담로는 백제 무령왕의 지방 지배 방식, ⑤황룡사 9층 목탑은 신라 선덕여왕 때 자장의 건의로 건립되었습니다.'},
{r:2,src:'74회 4번',q:'(가) 관산성 전투—백제왕 명농이 가야와 함께 신라를 공격 / (나) 백제왕이 신라 대야성을 공격. (가)와 (나) 사이에 있었던 사실로 옳은 것은?',choices:['백제가 국호를 남부여로 고쳤다.','진흥왕이 대가야를 공격하여 복속시켰다.','계백이 이끈 결사대가 황산벌에서 패배하였다.','김춘추가 당으로 건너가 군사 동맹을 체결하였다.','신라가 한강 하류를 차지하여 신주를 설치하였다.'],answer:1,exp:'(가) 554년 관산성 전투—백제 성왕이 신라를 공격하다 전사, (나) 642년 대야성 전투—백제 의자왕이 신라 대야성(합천) 함락. 두 사건 사이인 562년, 신라 진흥왕이 대가야를 정복하여 낙동강 유역으로 영토를 크게 확장하였습니다. ①백제가 국호를 남부여로 바꾼 것은 538년 성왕의 사비 천도와 함께 이루어졌으므로 (가) 이전, ③황산벌 전투는 660년(나) 이후, ④김춘추의 당 방문은 648년(나) 이후, ⑤신주 설치는 553년이므로 (가)와 (나) 사이가 맞으나 진흥왕이 한강 상류를 먼저 차지한 후 하류를 차지한 것이라 답은 ②입니다.'},
{r:2,src:'74회 5번',q:'능산리 고분군 동하총 현실 벽화의 (가) 국가에 대한 설명으로 옳은 것은?',choices:['일길찬, 사찬 등의 관등이 있었다.','지방 장관으로 욕살, 처려근지 등이 있었다.','특산물로 단궁, 과하마, 반어피가 유명하였다.','사회 질서를 유지하기 위해 범금 8조를 두었다.','왕족인 부여씨와 8성 귀족이 지배층을 이루었다.'],answer:4,exp:'능산리 고분군은 충남 부여에 있는 백제의 왕릉으로, 동하총 벽화에는 연꽃, 구름 등의 문양이 있어 백제 특유의 섬세한 문화를 보여줍니다. 백제의 지배층은 왕족인 부여씨(扶餘氏)와 8성 귀족(진씨·해씨·국씨·사씨·연씨·협씨·목씨·백씨)으로 구성되었습니다. ①일길찬·사찬은 신라의 17관등, ②욕살·처려근지는 고구려 지방관, ③단궁·과하마·반어피는 동예 특산물, ④범금 8조는 고조선입니다.'},
{r:2,src:'75회 7번',q:'당이 수나라 병사의 해골을 묻고 경관을 허문 이후, 왕이 동북에서 바다까지 장성을 쌓았다. 이 상황 이후에 있었던 사실로 옳은 것은?',choices:['을지문덕이 살수에서 대승을 거두었다.','고구려가 신라에 침입한 왜를 물리쳤다.','김무력이 관산성에서 백제군을 격파하였다.','연개소문이 정변을 일으켜 권력을 장악하였다.','백제가 평양성을 공격하여 고구려 왕이 전사하였다.'],answer:3,exp:'경관을 허물고 장성을 쌓는 것은 수·당과의 전쟁 이후로, 631년경의 상황입니다. 당 태종이 수나라 전사자 유해를 묻은 경관을 허물자(수당 관계 정상화), 고구려는 당의 침략에 대비해 631년부터 16년간 천리장성을 쌓았습니다. 이후 642년 연개소문이 영류왕을 시해하는 정변을 일으켜 권력을 장악하였습니다. ①살수대첩은 612년(장성 축조 이전), ②광개토왕의 왜 격퇴는 400년, ③관산성 전투는 554년, ⑤평양성 전투(고국원왕 전사)는 371년입니다.'},
{r:2,src:'76회 3번',q:'(가) 고구려왕 거련이 백제를 공격, 백제왕 경 살해 / (나) 백제왕이 고구려 평양성 공격, 고국원왕 전사 / (다) 백제왕 명농이 관산성 공격. 순서대로 나열하면?',choices:['(가)-(나)-(다)','(가)-(다)-(나)','(나)-(가)-(다)','(나)-(다)-(가)','(다)-(가)-(나)'],answer:2,exp:'각 사건의 연도: (나) 371년—근초고왕이 평양성 공격, 고국원왕(사유) 전사, (가) 475년—장수왕(거련)이 한성 함락, 개로왕(경) 살해, (다) 554년—성왕(명농)이 관산성 공격하다 신라에 전사. 따라서 순서는 (나)→(가)→(다)입니다. 백제와 고구려의 관계: 371년 백제 강성기(근초고왕)에 고구려를 공격 → 고구려 장수왕의 보복으로 475년 한성 함락 → 신라·백제 동맹(나제동맹) → 554년 관산성에서 역전 당해 성왕 전사.'},
{r:2,src:'76회 6번',q:'국학 설치로 유학 보급, 전국 9주로 행정 구역 정비, 고구려·백제·말갈인을 포함한 9서당 편성. 이 왕에 대한 설명으로 옳은 것은?',choices:['병부를 설치하고 율령을 반포하였다.','관료전을 지급하고 녹읍을 폐지하였다.','화랑도를 국가적인 조직으로 개편하였다.','관리 선발을 위해 독서삼품과를 시행하였다.','국호를 마진으로 바꾸고 도읍을 철원으로 옮겼다.'],answer:1,exp:'국학 설치, 9주 5소경 정비, 9서당(피정복민 포함) 편성은 신라 신문왕(681~692)의 업적입니다. 신문왕은 관료전을 지급하고 귀족의 경제적 기반이었던 녹읍을 폐지하여 왕권을 크게 강화하였습니다. ①병부 설치·율령 반포는 신라 법흥왕, ③화랑도 국가 조직화는 진흥왕, ④독서삼품과는 원성왕(788), ⑤국호 마진·철원 천도는 태봉(궁예)입니다. 신문왕의 왕권 강화 3대 업적: 김흠돌 난 진압, 녹읍 폐지, 국학 설치.'},
{r:2,src:'77회 5번',q:'백가의 난 평정, 중국 남조의 양에 강국이 되었다는 국서, 1971년 발굴된 무덤에서 지석과 석수 출토. 이 왕에 대한 설명으로 옳은 것은?',choices:['금마저에 미륵사를 창건하였다.','고흥에게 서기를 편찬하게 하였다.','지방의 22담로에 왕족을 파견하였다.','동진에서 온 마라난타를 통해 불교를 수용하였다.','장군 달기를 보내 고구려의 도살성을 점령하였다.'],answer:2,exp:'1971년 발굴된 백제 왕릉, 지석(묘지석)과 석수(돌로 만든 짐승 장식품), 벽돌무덤 양식은 무령왕릉입니다. 무령왕(501~523): ①백가의 난 평정으로 왕권 안정, ②중국 남조 양과 외교 강화("고구려를 여러 차례 격파한 강국"이라 천명), ③지방에 22담로(行政 거점)를 두고 왕족을 파견하여 지방 통제 강화. ①미륵사 창건은 무왕, ②서기 편찬은 근초고왕, ④마라난타를 통한 불교 수용은 침류왕, ⑤도살성 점령은 성왕입니다.'},
{r:2,src:'77회 6번',q:'(가) 왕이 태자를 보내 덕물도에서 소정방을 맞이하게 하고 7월 10일 백제를 공격하기로 약속 / (나) 사찬 시득이 기벌포에서 설인귀와 싸워 이기다. (가)-(나) 사이 사실로 옳은 것은?',choices:['을지문덕이 살수에서 대승을 거두었다.','복신과 도침이 부여풍을 왕으로 추대하였다.','윤충이 군사를 이끌고 대야성을 함락시켰다.','연개소문이 정변을 일으켜 영류왕을 시해하였다.','김춘추가 당으로 건너가 군사 연합을 성사시켰다.'],answer:1,exp:'(가) 660년 나당연합군의 백제 공격(소정방), (나) 676년 기벌포 해전(설인귀 격파, 삼국통일 완성). 두 사건 사이에 백제 멸망(660) → 백제 부흥 운동: 복신·도침이 부여풍을 왕으로 추대하여 항쟁(661~663) → 고구려 멸망(668) → 나당 전쟁 → 매소성 전투(675) → 기벌포 해전(676)으로 이어집니다. ①살수대첩은 612년, ③대야성 전투는 642년(이전), ④연개소문 정변은 642년(이전), ⑤김춘추 당 방문은 648년(이전)입니다.'},
// 예상
{r:2,src:'예상',q:'신라 진흥왕의 업적으로 옳지 않은 것은?',choices:['화랑도를 국가적인 조직으로 개편하였다.','대가야를 정복하여 낙동강 유역으로 영토를 확장하였다.','거칠부에게 「국사」를 편찬하도록 명하였다.','독서삼품과를 시행하여 인재를 등용하였다.','북한산·황초령·마운령 등에 순수비를 세웠다.'],answer:3,exp:'독서삼품과는 원성왕(788)이 시행한 관리 선발 제도로 유교 경전 이해 수준에 따라 3등급으로 나누어 관리를 채용했습니다. 진흥왕(540~576)의 업적: ①화랑도 국가 조직화(국가 인재 양성), ②대가야 정복(562), ③「국사」 편찬 명령(거칠부), ④순수비 건립(북한산·황초령·마운령·창녕)—영토 확장과 천하 순행 기념. 진흥왕은 한강 유역까지 영토를 크게 넓혀 신라가 삼국 통일의 주도권을 잡는 기반을 마련하였습니다.'},
{r:2,src:'예상',q:'백제의 수도 변천 순서로 옳은 것은?',choices:['사비→웅진→한성','한성→사비→웅진','한성→웅진→사비','웅진→한성→사비','사비→한성→웅진'],answer:2,exp:'백제의 수도 변천: ①한성(위례성, 현 서울 송파구 일대, 기원전 18년~475년) → ②웅진(현 공주, 475~538년, 고구려 장수왕의 침략으로 한성 함락 후 천도) → ③사비(현 부여, 538~660년, 성왕이 중흥을 위해 천도, 국호를 남부여로 변경). 각 시기 대표 왕: 한성—근초고왕·개로왕, 웅진—문주왕·무령왕, 사비—성왕·의자왕.'},
{r:2,src:'예상',q:'수·당과의 전쟁에서 고구려가 승리한 사례가 아닌 것은?',choices:['612년 을지문덕의 살수대첩','614년 수나라의 3차 고구려 원정 실패','645년 안시성 전투','660년 고구려군의 나당연합군 격퇴','631~647년 천리장성 축조로 당의 침략 방어'],answer:3,exp:'660년은 고구려가 아닌 백제가 나당연합군에 의해 멸망한 해입니다. 고구려는 668년 보장왕 때 나당연합군에 의해 멸망하였습니다. 고구려의 대외 전쟁 승리: ①612년 살수대첩(을지문덕, 수 양제의 30만 별동대 괴멸), ②645년 안시성 전투(성주 이름 미상, 당 태종의 침략 격퇴), ③고구려는 수·당의 여러 차례 침략을 막아냈으나 결국 668년 멸망하였습니다.'},

/* ━━━━━━━━━━━━ ④ 통일신라·발해 ━━━━━━━━━━━━ */
{r:3,src:'예상',q:'혜초가 저술한 「왕오천축국전」에 대한 설명으로 옳은 것은?',choices:['신라의 화엄사상을 인도에 전파한 외교 기록이다.','8세기 인도·중앙아시아·서아시아 등을 직접 여행한 기록이다.','발해의 고구려 계승 의식을 보여주는 역사서이다.','현재 한국 국립중앙박물관에 소장되어 있다.','통일신라의 토지 제도와 인구 현황을 기록한 문서이다.'],answer:1,exp:'혜초(慧超, 704~787)는 신라 출신 승려로 719~727년에 인도·중앙아시아·서아시아를 직접 여행하고 「왕오천축국전(往五天竺國傳)」을 저술하였습니다. 8세기 인도와 중앙아시아·서역의 불교 문화를 생생하게 기록한 귀중한 여행기입니다. 1908년 프랑스 학자 펠리오가 중국 돈황 석굴에서 발견하였으며, 현재 프랑스 국립도서관에 소장되어 있습니다. 통일신라의 불교 문화 수준과 해외 교류를 보여주는 중요한 자료입니다.'},
// 기출
{r:3,src:'74회 9번',q:'신라인 장보고 동영상 기획안 - #1 당으로 건너가 무령군 소장이 되다 / #2 (가) / #3 청해진 설치, 동아시아 무역 주도 / #4 왕위 쟁탈전에 휘말려 암살. (가)에 들어갈 내용으로 가장 적절한 것은?',choices:['화왕계를 지어 국왕에게 바치다','산동반도에 적산 법화원을 창건하다','외교 문서인 청방인문표를 작성하다','격황소서를 지어 세상에 이름을 떨치다','구법순례기인 왕오천축국전을 저술하다'],answer:1,exp:'이 동영상의 주인공은 장보고입니다. 장보고는 당의 무령군 소장으로 활약한 후 귀국하여 828년 완도에 청해진을 설치하고 서해·남해·동해의 해상 무역을 장악하였습니다. 당 산동반도에 신라인 사찰인 적산 법화원(赤山法華院)을 창건하여 당지 신라인들의 종교적 거점을 마련한 것도 장보고의 업적입니다. 화왕계는 설총(신문왕 때), 청방인문표는 강수, 격황소서는 최치원, 왕오천축국전은 혜초의 작품입니다.'},
{r:3,src:'75회 6번',q:'혜공왕 피살 이후 진골 귀족들의 왕위 다툼이 치열하던 시기에 일어났던 일로 (가)에 가장 적절한 것은?',choices:['김흠돌의 난이 진압되었어요.','만적이 개경에서 봉기를 도모하였어요.','관료전이 지급되고 녹읍이 폐지되었어요.','김헌창이 웅천주에서 반란을 일으켰어요.','이차돈의 순교를 계기로 불교가 공인되었어요.'],answer:3,exp:'혜공왕이 피살된 것은 780년으로, 이후 하대 신라에는 약 150년간 20명의 왕이 교체되는 극심한 왕위 쟁탈이 이어졌습니다. 이 시기인 822년, 웅천주 도독 김헌창이 아버지 김주원이 왕이 되지 못한 것에 불만을 품고 반란을 일으켰으나 진압되었습니다. ①김흠돌 난은 681년(신문왕 때, 그 이전), ②만적 봉기는 고려 시대, ③관료전 지급·녹읍 폐지는 신문왕(689년, 혜공왕 이전), ⑤이차돈 순교는 527년(법흥왕 때)입니다.'},
{r:3,src:'75회 8번',q:'연호 인안(무왕), 연호 대흥(문왕), 연호 건흥(인수)이 등장하는 국가에 대한 설명으로 옳은 것은?',choices:['골품에 따라 관등 승진을 제한하였다.','주자감을 설치하여 인재를 양성하였다.','내신좌평 등 6좌평의 관제를 정비하였다.','국경 지역인 양계에 병마사를 파견하였다.','상수리 제도를 통해 지방 세력을 견제하였다.'],answer:1,exp:'인안(무왕)·대흥(문왕)·건흥(인수)은 모두 발해의 연호입니다. 발해는 주자감(胄子監)을 설치하여 귀족 자제를 교육하였으며, 문적원(文籍院)을 두어 문서를 관리하였습니다. ①골품제는 신라, ③6좌평은 백제, ④양계·병마사는 고려, ⑤상수리 제도는 신라(지방 세력의 자제를 수도에 머물게 하는 인질제)입니다. 발해의 지방 제도: 5경 15부 62주.'},
{r:3,src:'76회 5번',q:'일본 도다이사 쇼소인에서 발견된 (가) 촌락 문서(서원경 부근 4개 촌락, 인구·토지·소·말·뽕나무·잣나무 기록). (가) 국가의 경제 상황으로 가장 적절한 것은?',choices:['경성과 경원에 무역소를 두었다.','솔빈부의 말을 특산품으로 수출하였다.','서적점, 다점 등의 관영 상점을 운영하였다.','청해진을 중심으로 해상 무역이 번성하였다.','특수 행정 구역인 소에서 여러 물품을 생산하였다.'],answer:3,exp:'도다이사 쇼소인의 촌락 문서(민정문서)는 8~9세기 신라의 것으로, 서원경(청주) 주변 4개 촌락의 인구·토지·가축·나무 수 등을 상세히 기록하여 조세 수취와 노동력 동원에 활용하였습니다. 신라는 청해진(완도)을 중심으로 장보고가 서해·남해를 장악하여 당·일본과의 해상 무역이 번성하였습니다. ①경성·경원 무역소는 조선(여진 무역), ②솔빈부의 말은 발해 특산품, ③서적점·다점 관영상점은 고려, ⑤소(所) 특수 행정구역은 고려입니다.'},
{r:3,src:'76회 8번',q:'최치원의 표문에서 발해 왕자 대봉예가 언급된 (가) 국가에 대한 설명으로 옳은 것은?',choices:['역사서인 유기와 신집을 편찬하였다.','내신좌평, 내두좌평 등 6좌평이 있었다.','5경 15부 62주의 지방 행정 제도를 갖추었다.','도병마사에서 변경의 군사 문제 등을 논의하였다.','골품에 따라 관등 승진, 일상생활 등을 엄격히 제한하였다.'],answer:2,exp:'대봉예(대문예의 후손)는 발해의 왕자입니다. 최치원이 당에 보낸 표문에서 발해 왕자가 신라 위에 서려 했다는 내용이 언급되는데, 이는 발해와 신라의 외교적 갈등을 보여줍니다. 발해는 5경(상경·중경·남경·동경·서경) 15부 62주의 체계적인 지방 행정 제도를 갖추었습니다. ①유기·신집은 고구려, ②6좌평은 백제, ④도병마사는 고려, ⑤골품제는 신라입니다.'},
{r:3,src:'77회 7번',q:'영역 5천 리, 5경 15부를 두고 서쪽 중국, 남쪽 신라, 북쪽 거란, 동쪽 일본과 교류한 이 국가에 대한 설명으로 옳은 것은?',choices:['12월에 영고라는 제천 행사를 열었다.','주자감을 설치하여 인재를 양성하였다.','군사 조직으로 9서당 10정을 편성하였다.','기인 제도를 실시하여 지방 세력을 견제하였다.','왕족인 부여씨와 8성 귀족이 지배층을 이루었다.'],answer:1,exp:'5경 15부와 동서남북 4개 나라와의 외교는 발해의 특징입니다. 발해는 주자감을 설치하여 귀족 자제를 교육하였으며, 문적원, 중정대, 정당성 등의 중앙 관제를 갖추었습니다. 중앙 정치: 3성 6부(당의 제도를 변형). ①영고(12월)는 부여, ③9서당 10정은 통일신라 신문왕, ④기인 제도는 고려(지방 호족 자제를 수도에 인질로), ⑤부여씨·8성 귀족은 백제입니다.'},
// 예상
{r:3,src:'예상',q:'통일신라 신문왕의 업적이 아닌 것은?',choices:['김흠돌 모역 사건을 진압하여 귀족 세력을 약화시켰다.','관료전을 지급하고 녹읍을 폐지하였다.','9주 5소경을 정비하고 9서당 10정을 편성하였다.','독서삼품과를 시행하여 관리를 선발하였다.','국학을 설치하여 유학 교육을 강화하였다.'],answer:3,exp:'독서삼품과는 원성왕(788)이 시행한 제도로, 유교 경전의 이해 수준에 따라 관리를 3등급(상·중·하)으로 선발하려 했습니다. 그러나 골품제와 충돌하여 제대로 시행되지 못했습니다. 신문왕(681~692)의 업적: ①681년 김흠돌 난 진압으로 귀족 숙청, ②689년 관료전 지급·녹읍 폐지(귀족의 경제적 기반 약화), ③9주 5소경 정비(지방 행정 완비), 9서당(중앙군) 10정(지방군) 편성, ④국학 설치(유학 인재 양성). 신문왕 대에 신라의 전제 왕권이 절정에 달했습니다.'},
{r:3,src:'예상',q:'발해가 고구려를 계승하였다는 근거로 옳지 않은 것은?',choices:['건국 주도 세력이 주로 고구려 유민이었다.','일본에 보낸 국서에서 고려(고구려)의 후예임을 밝혔다.','정혜공주묘의 모줄임 천장 구조와 돌사자상이 고구려 양식이다.','수도 상경 용천부의 구조가 고구려 평양성을 그대로 계승하였다.','벽돌 무덤이 아닌 고구려식 돌방무덤을 사용하였다.'],answer:3,exp:'발해 수도 상경 용천부는 당나라 장안성의 구조를 모방하여 바둑판 모양의 계획도시로 건설되었습니다. 고구려 평양성과는 구조가 다릅니다. 발해의 고구려 계승 근거: ①대조영을 비롯한 건국 주도 세력이 고구려 유민(일부 말갈도 포함), ②일본 국서에 "고려국(고구려국)"이라 자칭, ③정혜공주묘(모줄임 천장 구조·돌사자상)와 정효공주묘의 벽화가 고구려 양식 계승, ④고구려식 돌방무덤(굴식 돌방무덤) 사용. 발해를 "해동성국"이라 불렀습니다.'},
{r:3,src:'예상',q:'원효의 사상과 활동에 대한 설명으로 옳은 것은?',choices:['화엄사상을 바탕으로 교종 통합을 시도하였다.','일심 사상과 화쟁 사상으로 불교 대중화에 기여하였다.','참선과 수행을 통한 깨달음을 강조하는 선종을 도입하였다.','교관겸수를 주장하며 천태종을 개창하였다.','화엄일승법계도를 작성하고 영주 부석사를 창건하였다.'],answer:1,exp:'원효(617~686)는 일심(一心) 사상과 화쟁(和諍) 사상으로 종파 간 갈등을 극복하고 불교 대중화에 크게 기여하였습니다. 아미타 신앙(염불로 누구나 극락왕생)을 보급하여 불교를 서민층까지 확산시켰습니다. 저서: 금강삼매경론·대승기신론소. ①화엄사상은 의상, ③선종 도입은 도의 등 9산선문 개창자들, ④교관겸수·천태종은 고려 의천, ⑤화엄일승법계도·부석사는 의상입니다.'},

/* ━━━━━━━━━━━━ ⑤ 고려 ━━━━━━━━━━━━ */
// 기출
{r:4,src:'74회 12번',q:'거란 낙타를 만부교 아래에 묶어 굶어 죽인 사건 이후에 있었던 사실로 옳은 것은?',choices:['묘청이 칭제 건원을 주장하였다.','강감찬이 흥화진 전투에서 승리하였다.','서희의 외교로 강동 6주를 획득하였다.','최우가 강화도로 도읍을 옮겨 항전하였다.','윤관이 별무반을 이끌고 동북 9성을 개척하였다.'],answer:2,exp:'만부교 사건(942년): 거란이 낙타 50필과 사신 30인을 보냈으나 태조 왕건이 낙타를 만부교 아래 매어 굶겨 죽이고 사신은 섬으로 유배—거란의 발해 멸망을 결코 용납하지 않겠다는 의지 표현. 이후 993년 거란의 1차 침입 시 서희가 외교 담판을 벌여 강동 6주를 획득하였습니다. ①묘청의 칭제 건원은 1135년, ②흥화진 전투는 1010년(2차 침입), ④최우의 강화 천도는 1232년(몽골 침입), ⑤윤관 동북 9성은 1107년입니다.'},
{r:4,src:'75회 10번',q:'(가) 견훤이 신라 수도 침입, 신라왕을 자결하게 함 / (나) 견훤이 고창군을 포위. (가)-(나) 사이에 있었던 사실로 옳은 것은?',choices:['신숭겸이 공산 전투에서 전사하였다.','안승이 보덕국의 왕으로 책봉되었다.','흑치상지가 임존성에서 군사를 일으켰다.','최치원이 왕에게 시무 10여 조를 건의하였다.','왕건이 일리천 전투에서 신검에게 승리하였다.'],answer:0,exp:'(가) 927년 견훤의 신라 침입—포석정에서 경애왕 자결 강요, 경순왕 옹립. 같은 해(927) 왕건이 공산(팔공산) 전투에서 견훤에게 크게 패하고 신숭겸이 왕건 대신 죽음으로써 왕건이 탈출하였습니다. (나) 930년 고창(안동) 전투. 따라서 공산 전투(927)는 (가)와 (나) 사이에 해당합니다. ②안승 보덕국은 신라 문무왕 때, ③흑치상지는 백제 부흥 운동, ④최치원 시무책은 진성여왕 때, ⑤일리천 전투는 936년(나 이후)입니다.'},
{r:4,src:'75회 11번',q:'태학조교와 나주목 경학박사 치하, 처음으로 12목을 설치하고 경학박사와 의학박사를 파견한 (가) 왕에 대한 설명으로 옳은 것은?',choices:['광덕, 준풍 등의 독자적 연호를 사용하였다.','신돈을 중심으로 전민변정 사업을 추진하였다.','청연각과 보문각을 두어 학문 연구를 장려하였다.','정계와 계백료서를 지어 관리의 규범을 제시하였다.','최승로의 시무 28조를 받아들여 통치 체제를 정비하였다.'],answer:4,exp:'12목 설치와 최승로의 시무 28조 수용은 고려 성종(981~997)의 업적입니다. 성종은 최승로의 건의를 받아들여 중앙에 2성 6부를 갖추고, 전국에 12목을 설치하여 지방관을 파견함으로써 고려의 중앙집권적 통치 체제를 완성하였습니다. 흑창을 의창으로 개편하고, 국자감을 설치하였습니다. ①광덕·준풍은 광종의 연호, ②전민변정도감·신돈은 공민왕, ③청연각·보문각은 인종, ④정계·계백료서는 태조 왕건입니다.'},
{r:4,src:'76회 12번',q:'야별초를 좌·우별초로 나누어 편성한 (가) 인물에 대한 설명으로 옳은 것은?',choices:['원종을 폐위하고 안경공 창을 즉위시켰다.','9재 학당을 설립하여 유교 교육에 힘썼다.','인사 행정 담당 기구로 정방을 설치하였다.','전민변정도감의 책임자로서 개혁을 이끌었다.','오월에 사신을 보내고 검교태보의 직을 받았다.'],answer:2,exp:'야별초 편성과 정방 설치는 최우(崔瑀, 최충헌의 아들)의 업적입니다. 최우는 아버지 최충헌으로부터 권력을 이어받아 ①정방(政房): 자신의 사저에 설치한 인사 행정 기구로 관리 임명권 독점, ②교정도감(최충헌이 설치): 최고 권력 기구, ③야별초(夜別抄): 밤에 도적을 잡는 군대로 시작, 이후 좌별초·우별초·신의군(몽골 포로 출신)으로 발전. ①원종 폐위는 임유무, ②9재 학당은 최충(문벌귀족), ④전민변정도감 책임자는 신돈(공민왕 때), ⑤오월 사신·검교태보는 태조 왕건입니다.'},
{r:4,src:'76회 16번',q:'동소·철소·자기소·지소·묵소 등의 소 운영과 해동통보 발행이 이루어진 국가의 경제 모습으로 옳은 것은?',choices:['청해진을 설치하여 해상 무역을 전개하였다.','재정 문제를 해결하기 위한 당백전이 발행되었다.','계해약조가 체결되어 세견선의 입항이 허가되었다.','육의전을 제외한 시전 상인의 금난전권이 폐지되었다.','예성강 하구의 벽란도가 국제 무역항으로 번성하였다.'],answer:4,exp:'소(所)는 고려 특수 행정 구역으로 동(구리)·철·자기·종이·먹 등 특수 물품을 생산하여 국가에 공납하였습니다. 해동통보는 고려 숙종이 주전도감을 설치하여 발행한 화폐입니다. 고려의 경제: 벽란도(예성강 하구)가 국제 무역항으로 번성하여 아라비아 상인들도 내왕하였고(코리아의 어원 "Corea"가 이때 전파), 대식국인이 무역했습니다. ①청해진은 통일신라, ②당백전은 흥선대원군, ③계해약조는 조선 세종, ④신해통공·금난전권 폐지는 조선 정조입니다.'},
{r:4,src:'77회 11번',q:'현화사비 앞면에 송의 연호 천희, 뒷면에 (가)의 연호 태평이 새겨지고 귀주대첩으로 격퇴한 (가)에 대한 고려의 대응으로 옳은 것은?',choices:['별무반을 편성하였다.','화통도감을 설치하였다.','진관 체제를 실시하였다.','초조대장경을 조판하였다.','동녕부의 반환을 요청하였다.'],answer:3,exp:'태평은 거란(요)의 연호입니다. 귀주대첩은 1019년 강감찬이 거란 3차 침입을 막아낸 전투입니다. 고려가 거란의 침입에 대응하여 취한 조치: ①1차 침입(993)—서희의 외교 담판, 강동 6주 획득, ②2차 침입(1010)—개경 함락, 강조의 난이 빌미, 양규의 항전, ③3차 침입(1019)—귀주대첩, 이후 나성 축조, ④초조대장경 조판(1011~1087)—거란 격퇴를 기원하여 부처의 힘으로 외적을 물리치고자 제작. ①별무반은 여진, ②화통도감은 최무선(왜구), ③진관체제는 조선, ⑤동녕부는 몽골(원)에 요청.'},
{r:4,src:'77회 16번',q:'이의민을 제거하고 집권한 (가)가 교정별감이 되어 전횡을 일삼아 희종이 암살을 시도하였으나 도방의 방해로 실패한 인물에 대한 설명으로 옳은 것은?',choices:['비담과 염종의 반란을 진압하였다.','만권당에서 원의 학자들과 교유하였다.','인사 행정을 담당하던 정방을 폐지하였다.','봉사 10조를 올려 시정 개혁을 건의하였다.','오월에 사신을 보내고 검교태보의 직을 받았다.'],answer:3,exp:'이의민을 제거하고 집권한 인물은 최충헌입니다. 최충헌은 1196년 이의민을 제거하고 집권하여 ①교정도감을 설치하여 국정 총괄, ②봉사 10조를 명종에게 올려 시정 개혁 건의(부패한 토지 겸병·불교 폐단 시정 등), ③도방(都房): 사병 기구 설치, ④희종이 최충헌 암살을 기도했으나 도방에 의해 실패. ①비담·염종 진압은 신라 김유신, ②만권당 교유는 이제현(고려 말), ③정방 폐지는 공민왕, ⑤오월·검교태보는 태조 왕건.'},
// 예상
{r:4,src:'예상',q:'고려 광종의 업적으로 옳은 것은?',choices:['훈요 10조를 지어 후대 왕에게 남겼다.','노비안검법과 과거제를 실시하였다.','최승로의 시무 28조를 수용하였다.','전국에 12목을 설치하고 지방관을 파견하였다.','전시과 제도를 처음으로 시행하였다.'],answer:1,exp:'고려 광종(949~975): ①노비안검법(956)—후삼국 전쟁 중 억울하게 노비가 된 자를 해방하여 호족 세력 약화, 국가 재정 강화, ②과거제(958)—쌍기의 건의로 중국식 과거를 도입하여 능력에 따른 관리 선발, ③광덕·준풍의 독자 연호 사용, ④칭황(황제 칭호) 사용, ⑤공복 제정(관리 복장 통일). ①훈요 10조는 태조 왕건, ③시무 28조 수용·④12목 설치는 성종, ⑤전시과 최초 시행은 경종입니다.'},
{r:4,src:'예상',q:'고려 공민왕의 반원 자주 정책에 해당하지 않는 것은?',choices:['친원파 기철 등을 숙청하였다.','정동행성 이문소를 폐지하였다.','쌍성총관부를 공격하여 철령 이북 영토를 수복하였다.','전민변정도감을 설치하고 신돈을 기용하였다.','위화도 회군으로 실권을 장악하였다.'],answer:4,exp:'위화도 회군(1388)은 이성계가 단행한 것으로 공민왕(1351~1374) 이후의 일입니다. 공민왕은 이미 1374년 시해되었습니다. 공민왕의 반원 자주 정책: ①기철 등 친원파 숙청(1356), ②정동행성 이문소 폐지(원 내정간섭 기구), ③쌍성총관부 공격(유인우 파견)으로 철령 이북 동북면 수복, ④전민변정도감 설치(신돈 기용)—권문세족의 불법 점탈 토지·노비 환원. 공민왕의 반원 정책은 결국 원의 반발과 친원 세력의 저항으로 좌절되었습니다.'},
{r:4,src:'예상',q:'「직지심체요절」에 대한 설명으로 옳은 것은?',choices:['고려 시대 불교 관련 역사를 기록한 역사서이다.','1377년 청주 흥덕사에서 금속활자로 인쇄되었다.','현재 국내 한국 국립박물관에 소장되어 있다.','고려 태조가 불교 진흥을 위해 제작하였다.','목판 인쇄물로 세계에서 가장 오래된 인쇄물이다.'],answer:1,exp:'직지심체요절(직지심경): 고려 1377년 청주 흥덕사에서 백운화상의 저서를 금속활자로 인쇄한 세계 최초의 금속활자 인쇄본(현존 기준)입니다. 구텐베르크의 성경(1455)보다 78년 앞서 제작되었습니다. 현재 프랑스 국립도서관에 소장되어 있으며(병인양요 때 약탈), 2001년 유네스코 세계기록유산으로 등재되었습니다. ①역사서가 아니라 불교 선(禪) 수행의 요체를 정리한 불서, ③프랑스 국립도서관 소장, ④백운화상이 제작, ⑤목판이 아닌 금속활자 인쇄물입니다.'},

/* ━━━━━━━━━━━━ ⑥ 조선 ━━━━━━━━━━━━ */
// 기출
{r:5,src:'74회 20번',q:'이시애의 난을 평정한 공으로 책봉된 왕의 재위 시기에 있었던 사실로 옳은 것은?',choices:['간경도감이 설치되었다.','조선경국전이 편찬되었다.','국조오례의가 완성되었다.','부민고소금지법이 제정되었다.','혼일강리역대국도지도가 제작되었다.'],answer:0,exp:'이시애의 난(1467년)은 세조 때 일어났으며, 이를 진압한 공신들이 책봉된 것도 세조 때입니다. 간경도감(刊經都監)은 세조가 불교 경전 간행을 위해 설치한 기구입니다. 세조는 불심이 깊어 직접 간경도감을 설치하고 한글로 불경을 번역하였습니다. ②조선경국전은 정도전이 태조 때 편찬, ③국조오례의는 성종 때 완성, ④부민고소금지법은 세종 때 제정, ⑤혼일강리역대국도지도는 태종 때(1402) 제작—동양 최고(最古) 세계 지도.'},
{r:5,src:'74회 22번',q:'(가) 조광조 등의 복직 유언(중종 말) / (나) 양재역 벽서 사건(문정왕후 관련). (가)-(나) 사이에 있었던 사실로 옳은 것은?',choices:['자의 대비의 복상 문제로 예송이 일어났다.','외척 간의 권력 다툼으로 윤임이 제거되었다.','세자 책봉 문제를 계기로 정철이 유배되었다.','희빈 장씨 소생의 원자 책봉 문제로 환국이 발생하였다.','폐비 윤씨 사사 사건의 전말이 알려져 김굉필 등이 처형되었다.'],answer:1,exp:'(가)는 중종 말기(1544년경 유언), (나)는 1547년 양재역 벽서 사건—을사사화(1545)의 연장선으로 대윤 잔당을 추가 처벌. 두 사건 사이인 1545년 을사사화: 문정왕후의 지지를 받은 소윤 윤원형이 대윤 윤임(인종의 외척)을 제거. 인종이 재위 8개월 만에 죽고 명종이 즉위하자 소윤이 권력을 장악하였습니다. ①예송은 현종 때(1659, 1674), ③정철 유배는 선조(기축옥사), ④환국은 숙종, ⑤갑자사화(1504)는 연산군 때.'},
{r:5,src:'75회 19번',q:'이방석을 왕세자로 삼은 사건을 탐구하는 활동으로 가장 적절한 것은?',choices:['제1차 왕자의 난이 일어난 이유를 찾아본다.','수양대군이 정권을 장악하는 과정을 조사한다.','사림이 동인과 서인으로 나뉘게 된 계기를 파악한다.','폐모살제 등을 구실로 반정을 일으킨 세력을 검색한다.','허적과 윤휴 등 남인이 대거 축출되는 사건을 알아본다.'],answer:0,exp:'이방석이 왕세자로 책봉된 것(1392년)은 이방원(태종)이 1398년 1차 왕자의 난을 일으킨 직접적 계기입니다. 이방원은 공신인 정도전·이방석 등을 제거하고 실권을 장악하였으며, 이어 1400년 2차 왕자의 난도 일으켰습니다. ②수양대군 계유정난(1453)은 세종의 아들이 단종을 무력으로 제거한 사건, ③동인·서인 분당(1575)은 선조 때, ④인조반정(1623)은 광해군의 폐모살제가 빌미, ⑤경신환국(1680)은 숙종 때입니다.'},
{r:5,src:'76회 19번',q:'박연이 만든 편경을 활용하여 궁중 음악 아악을 정비하는 이 왕의 재위 시기에 있었던 사실로 옳은 것은?',choices:['훈련 교범인 무예도보통지가 간행되었다.','전통 한의학을 정리한 동의보감이 저술되었다.','음악 이론 등을 집대성한 악학궤범이 완성되었다.','유교 윤리의 보급을 위해 삼강행실도가 편찬되었다.','군정, 재정의 내용을 정리한 만기요람이 만들어졌다.'],answer:3,exp:'박연의 편경 제작과 아악 정비는 세종(1418~1450) 때의 일입니다. 세종의 문화 업적: ①삼강행실도(유교 윤리 교화서, 충신·효자·열녀 그림 포함), ②칠정산(독자적 역법), ③농사직설(우리나라 실정에 맞는 농서), ④갑인자(금속활자), ⑤훈민정음 창제(1443), ⑥박연의 아악 정비. ①무예도보통지는 정조, ②동의보감은 광해군(허준), ③악학궤범은 성종, ⑤만기요람은 순조 때입니다.'},
{r:5,src:'77회 21번',q:'훈련도감 설치를 건의하고 대공수미법을 제안하여 안동 병산 서원에 위패가 봉안된 (가) 인물에 대한 설명으로 옳은 것은?',choices:['기대승과 사단칠정 논쟁을 전개하였다.','소학의 보급과 현량과 실시를 주장하였다.','기축봉사를 올려 명에 대한 의리를 내세웠다.','임진왜란의 상황 등을 담은 징비록을 저술하였다.','최초로 100리 척을 사용하여 동국지도를 제작하였다.'],answer:3,exp:'훈련도감 설치 건의, 대공수미법 제안, 병산서원 배향은 유성룡(1542~1607)의 업적입니다. 유성룡은 임진왜란 당시 영의정으로 「징비록(懲毖錄)」을 저술하여 전쟁의 참상과 교훈을 기록하였습니다(국보 132호). ①기대승과 사단칠정 논쟁은 이황(퇴계), ②소학 보급·현량과는 조광조(중종), ③기축봉사는 이이 계열(정철), ⑤동국지도(100리 척 사용)는 정상기(영조 때)입니다.'},
// 예상
{r:5,src:'예상',q:'조선 세조의 업적으로 옳은 것은?',choices:['집현전을 설치하여 학문 연구를 장려하였다.','경국대전을 완성하여 법치 통치의 기반을 마련하였다.','현직 관리에게만 수조권을 지급하는 직전법을 시행하였다.','삼포왜란의 수습을 위해 임신약조를 체결하였다.','서원 철폐 등을 단행하며 왕권 강화에 노력하였다.'],answer:2,exp:'직전법(職田法, 1466년): 세조가 현직 관리에게만 수조권을 지급하는 제도를 시행하였습니다. 기존 과전법은 퇴직 후에도 토지(수신전·휼양전)를 유지하여 토지가 부족해지는 문제가 있었는데, 직전법으로 이를 해결하였습니다. 세조의 업적: 계유정난, 6조 직계제, 직전법, 간경도감, 이시애의 난 진압. ①집현전은 세종, ②경국대전 완성은 성종, ④임신약조는 중종, ⑤서원 철폐는 흥선대원군입니다.'},
{r:5,src:'예상',q:'조선 영조의 탕평책에 대한 설명으로 옳지 않은 것은?',choices:['탕평비를 건립하여 붕당 폐해를 경계하였다.','이인좌의 난을 진압하고 탕평의 의지를 강화하였다.','균역법을 실시하여 군역 부담을 1필로 줄였다.','신해통공을 실시하여 금난전권을 폐지하였다.','「동국문헌비고」와 「속대전」을 편찬하였다.'],answer:3,exp:'신해통공(辛亥通共, 1791)은 정조가 채제공의 건의로 단행한 정책으로 육의전을 제외한 시전 상인들의 금난전권(난전 금지 특권)을 폐지하여 자유 상업 활동을 허용하였습니다. 영조(1724~1776)의 업적: ①탕평비 건립(성균관), ②이인좌의 난 진압(1728), ③균역법(군포 2필→1필, 부족분은 결작·선무군관포로 충당), ④「동국문헌비고」(백과사전적 문헌)·「속대전」 편찬, ⑤준천사 설치(청계천 준설).'},
{r:5,src:'예상',q:'조선 후기 각 실학자와 그 저서가 바르게 연결된 것은?',choices:['유형원 - 목민심서','이익 - 반계수록','정약용 - 목민심서','홍대용 - 열하일기','박지원 - 북학의'],answer:2,exp:'정약용의 저서: 목민심서(牧民心書, 목민관의 지침서), 경세유표(국가 제도 개혁론), 흠흠신서(형법 개혁). 실학자별 저서: 유형원—반계수록(균전론), 이익—성호사설(한전론·폐단 6가지), 홍대용—의산문답(지전설·무한우주론), 박지원—열하일기(수레·선박 필요성), 박제가—북학의(절약보다 소비 권장, 청과 통상 강화). 이를 반드시 구분하여 암기해야 합니다.'},
{r:5,src:'예상',q:'임진왜란 중에 있었던 사실로 옳지 않은 것은?',choices:['신립이 탄금대 전투에서 패배하였다.','이순신이 한산도 대첩에서 학익진으로 승리하였다.','곽재우·조헌·고경명 등 의병장이 활약하였다.','삼전도에서 인조가 청에 항복하였다.','훈련도감이 설치되어 조선의 군사 제도가 변화하였다.'],answer:3,exp:'삼전도 항복(1637)은 병자호란 때의 일입니다. 임진왜란은 1592~1598년에 일어났고, 병자호란은 1636~1637년입니다. 임진왜란 중 사건: ①신립 탄금대 전투 패배(1592), ②이순신 한산도 대첩(1592, 학익진 전법), ③곽재우·조헌·고경명 등 의병 활약, ④훈련도감 설치(1593, 선조 때 유성룡 건의—포수·살수·사수 삼수병 편성), ⑤정유재란(1597) 등. 인조반정(1623)과 병자호란(1636)은 임진왜란 이후입니다.'},
{r:5,src:'예상',q:'조선의 토지 제도 변화를 순서대로 바르게 나열한 것은?',choices:['과전법 → 직전법 → 관수관급제','직전법 → 과전법 → 관수관급제','과전법 → 관수관급제 → 직전법','관수관급제 → 과전법 → 직전법','직전법 → 관수관급제 → 과전법'],answer:0,exp:'조선 토지 제도 변화: ①과전법(科田法, 1391년, 고려 말~조선 초) → ②직전법(職田法, 1466년, 세조): 현직 관리에게만 지급—수신전·휼양전 폐지 → ③관수관급제(官收官給制, 1470년, 성종): 국가가 직접 조세 수취 후 관리에게 지급—양반 지주의 수조권 직접 행사 폐지. 이후 16세기 말~17세기에는 수조권 지급 자체가 폐지되고 급료(녹봉)만 지급하는 방식으로 완전히 전환되었습니다.'},
{r:5,src:'예상',q:'조선 후기 상품 화폐 경제의 발달에 대한 설명으로 옳은 것은?',choices:['해동통보와 건원중보가 전국적으로 유통되었다.','조선 초기부터 상평통보가 전국에 유통되었다.','보부상은 지방 행상으로 주로 농업에 종사하였다.','덕대가 물주에게 자금을 받아 광산을 경영하였다.','시전 상인들이 전국 상권을 독점하여 사상이 성장하지 못하였다.'],answer:3,exp:'조선 후기 상업 발달: 덕대(德大)가 물주에게 자본을 투자받아 광산을 경영하는 전문 광산 경영자 제도가 발달하였습니다(설점수세제). 조선 후기 경제 특징: 상평통보(숙종, 1678년부터 전국 유통), 보부상(褓負商, 보상+부상: 봇짐장수+등짐장수), 도고(특정 상품 독점 매매), 송상(개성 상인)·만상(의주) 활동. 해동통보·건원중보는 고려의 화폐입니다.'},
{r:5,src:'예상',q:'조선 성종의 업적으로 옳은 것은?',choices:['집현전을 설치하여 학문 연구를 장려하였다.','노비안검법과 과거제를 실시하였다.','「경국대전」을 완성하여 법치의 기틀을 마련하였다.','직전법으로 토지 지급 대상을 현직 관리로 제한하였다.','삼포를 개방하고 계해약조를 체결하였다.'],answer:2,exp:'「경국대전(經國大典)」: 세조 때 편찬을 시작하여 성종(1469~1494) 때 1485년 완성·반포. 조선의 기본 법전으로 이전·호전·예전·병전·형전·공전의 6전 체계로 구성. 이 법전의 완성으로 조선의 통치 제도가 완비되었습니다. 성종의 업적: 경국대전 완성, 홍문관 설치, 악학궤범·동국여지승람·국조오례의 편찬, 사림 세력 등용. ①집현전은 세종, ②노비안검법·과거제는 고려 광종, ④직전법은 세조, ⑤삼포 개방·계해약조는 세종입니다.'},
{r:5,src:'예상',q:'조선 후기 사회 변화에 대한 설명으로 옳지 않은 것은?',choices:['공명첩 발급으로 일부 양인이 신분을 상승시킬 수 있었다.','서얼들이 통청 운동을 전개하여 청요직 진출을 요구하였다.','중인 계층이 시사를 조직하여 문예 활동을 하였다.','향도(香徒)가 전국적으로 확산되어 농민들의 단결을 이끌었다.','부농층이 성장하고 몰락 양반이 증가하는 신분 질서 동요가 나타났다.'],answer:3,exp:'향도는 고려 시대 불교 신앙 조직으로 시작하여 조선 시대에는 마을 공동체 조직으로 변화하였지만, 전국적으로 확산되어 농민들의 정치적 단결을 이끌었다는 것은 과장된 설명입니다. 조선 후기 사회 변화: ①공명첩(비어있는 관직 임명장)으로 신분 상승 가능, ②서얼 통청 운동(청요직 진출 요구), ③중인의 시사(詩社) 조직·위항문학 발달, ④납속(곡물 납부로 신분 상승), ⑤신분 질서 동요(부농 성장, 몰락 양반 증가).'},

/* ━━━━━━━━━━━━ ⑦ 개화기 ━━━━━━━━━━━━ */
// 기출
{r:6,src:'74회 31번',q:'고부 민란에서 사발통문을 작성하고 전봉준 등이 봉기를 전개한 (가) 운동의 탐구 활동으로 가장 적절한 것은?',choices:['삼국 간섭의 결과를 알아본다.','척화비가 건립된 계기를 조사한다.','전주 화약이 체결되는 과정을 살펴본다.','영국이 거문도를 점령한 목적을 분석한다.','외규장각 도서가 약탈된 배경을 찾아본다.'],answer:2,exp:'고부 민란(1894.1)은 조병갑의 탐학에 항거하여 전봉준이 사발통문을 돌려 농민들을 모은 사건으로, 동학 농민 운동(1894)의 시작입니다. 동학 농민 운동 전개: 고부 민란 → 4대 강령 발표 → 황토현·황룡촌 전투 → 전주성 점령 → 전주 화약(집강소 설치·폐정개혁안 실시 합의) → 2차 봉기 → 우금치 전투 패배. ①삼국 간섭은 청일전쟁 후 시모노세키 조약 관련, ②척화비는 신미양요(1871) 이후, ④거문도 사건(1885), ⑤외규장각 도서 약탈은 병인양요(1866)입니다.'},
{r:6,src:'74회 36번',q:'경성보고에서 서울 보성고보 학생 장채극이 독립선언서 배포와 국민 대회 취지서 배포에 참여한 (가) 운동에 대한 설명으로 옳은 것은?',choices:['정우회 선언의 영향을 받았다.','통감부의 탄압과 방해로 중단되었다.','순종의 인산일을 기회로 삼아 추진되었다.','전개 과정에서 일제가 재암리 학살 등을 자행하였다.','성진회와 각 학교 독서회에 의해 전국적으로 확산되었다.'],answer:2,exp:'독립선언서 배포, 국민 대회 취지서는 6·10 만세운동(1926)과 관련됩니다. 6·10 만세운동: 순종(마지막 황제)의 인산일(장례일, 1926.6.10.)을 기회로 삼아 사회주의 계열과 민족주의 계열이 함께 만세 시위를 전개하였습니다. ①정우회 선언(1926) 이후 신간회 결성(1927)과 연결, ②통감부의 탄압은 1905~1910년대, ③순종 인산일—맞음, ④재암리 학살은 3·1 운동(1919) 관련, ⑤성진회·독서회는 광주학생항일운동(1929)입니다.'},
{r:6,src:'75회 28번',q:'김옥균 등이 청의 자주권 침해에 분노하여 일본 공사와 (가)를 일으켜 실패하였다. (가) 사건의 결과로 옳은 것은?',choices:['개혁 추진 기구로 교정청이 설치되었다.','전개 과정에서 홍범 14조가 반포되었다.','통리기무아문이 신설되는 배경이 되었다.','김기수가 수신사로 파견되는 결과를 가져왔다.','청일 간에 톈진 조약이 체결되는 계기가 되었다.'],answer:4,exp:'갑신정변(1884): 김옥균·박영효·홍영식 등 개화당이 우정총국 개국 축하연을 이용하여 쿠데타를 단행(12.4). 일본의 지원을 기대했으나 청군 개입으로 3일 만에 실패. 결과: ①한성 조약(조선-일본): 피해 보상, 일본 공사관 재건 비용 조선 부담 ②톈진 조약(청-일): 두 나라 모두 조선에서 군대 철수, 향후 조선 파병 시 상호 통보—10년 후 동학 농민운동 계기로 이 조약이 발동됨. ①교정청은 동학 농민 운동 수습용, ②홍범 14조는 2차 갑오개혁, ③통리기무아문은 1880년(개화 정책 추진), ④김기수 수신사는 1876년입니다.'},
{r:6,src:'76회 32번',q:'독립관에서 토론회를 개최한 (가) 단체의 활동으로 옳은 것은?',choices:['고종 강제 퇴위 반대 운동을 주도하였다.','만세보를 발행하여 민족의식을 고취하였다.','파리 강화 회의에 독립 청원서를 제출하였다.','관민 공동회를 개최하여 헌의 6조를 결의하였다.','계몽 서적을 보급하기 위해 태극 서관을 운영하였다.'],answer:3,exp:'독립관은 독립협회(1896~1898)가 사용하던 건물로, 독립협회는 ①독립신문·독립문 건립, ②만민공동회(1898)—민중 집회, ③관민공동회—정부 관리와 민간인이 함께 헌의 6조 결의(의회 설립·언론 자유·조세 법정주의 등). ①고종 강제 퇴위 반대는 대한자강회(1907), ②만세보는 천도교 기관지, ③파리 강화 회의 청원서는 신한청년당(김규식, 1919), ⑤태극 서관은 신민회(1907~1911)입니다.'},
{r:6,src:'77회 33번',q:'자신회(오적 처단 목적), 중명전(조약 강제 체결 장소), 민영환(조약에 항거 자결). 이 조약에 대한 설명으로 옳은 것은?',choices:['청의 알선으로 체결이 추진되었다.','통감부가 설치되는 결과를 가져왔다.','천주교 포교를 허용하는 근거가 되었다.','스티븐스가 외교 고문으로 부임하는 계기가 되었다.','대한 제국 군대의 해산을 규정하는 내용이 포함되어 있다.'],answer:1,exp:'오적(五賊: 을사늑약에 찬성한 5대신—이완용·이근택·박제순·이지용·권중현) 처단 목적의 자신회 조직, 중명전(덕수궁 별채)에서 강제 체결, 민영환의 자결은 모두 을사늑약(乙巳勒約, 1905)의 관련 내용입니다. 을사늑약: 외교권 박탈 → 통감부 설치(초대 통감 이토 히로부미). ①청의 알선은 조미수호통상조약(1882), ③천주교 포교는 조프통상조약(1886), ④스티븐스 부임은 1차 한일협약(1904), ⑤군대 해산은 정미의병(1907) 관련 한일신협약입니다.'},
{r:6,src:'77회 31번',q:'묄렌도르프의 집이 원래 선혜청 당상 민겸호의 집이었으나 그가 (가) 때 피살되어 고종이 하사한 것이고, (가)를 진압한 청이 묄렌도르프를 외교 고문으로 추천하였다. (가) 사건에 대한 설명으로 옳은 것은?',choices:['김옥균 등 개화파가 주도하였다.','제물포 조약이 체결되는 계기가 되었다.','전개 과정에서 홍범 14조가 반포되었다.','통리기무아문이 설치되는 배경이 되었다.','외규장각 도서가 약탈되는 결과를 가져왔다.'],answer:1,exp:'민겸호 피살, 청이 진압하고 외교 고문을 추천한 것은 임오군란(1882)입니다. 구식 군인들이 13개월 치 밀린 급료 지급에 항의하여 봉기, 민겸호 등 고위 관리를 살해하였습니다. 결과: ①조청상민수륙무역장정(청 상인 내지 통상권 획득) ②제물포 조약(일본에 배상금 지불, 공사관 일본 군대 주둔 허용) ③묄렌도르프 외교 고문 부임. ①개화파 주도는 갑신정변, ③홍범 14조는 2차 갑오개혁, ④통리기무아문 설치는 1880년(임오군란 이전), ⑤외규장각 약탈은 병인양요입니다.'},
// 예상
{r:6,src:'예상',q:'강화도 조약(1876)의 내용으로 옳지 않은 것은?',choices:['부산·원산·인천 3개 항구를 개항하였다.','일본의 해안 측량권을 인정하였다.','조선이 자주독립국임을 확인하였다.','최혜국대우 조항을 포함하였다.','일본 외교관에게 치외법권을 인정하였다.'],answer:3,exp:'최혜국대우 조항을 처음 포함한 것은 조미수호통상조약(1882)입니다. 강화도 조약(조일수호조규, 1876.2)은 조선이 체결한 최초의 근대적 불평등 조약입니다. 주요 내용: ①조선은 자주독립국(청의 종주권 부정→조선 독립 간섭 배제 의도), ②부산(즉시)·원산(1880)·인천(1883) 개항, ③일본 영사재판권(치외법권) 인정, ④일본의 해안 측량권, ⑤무관세(무역 장정에서는 일부 관세 허용). 이 조약은 일본이 이익을 얻기 위해 강압적으로 체결시킨 불평등 조약입니다.'},
{r:6,src:'예상',q:'동학 농민 운동(1894)의 전개 순서로 옳은 것은?',choices:['고부 민란 → 황토현 전투 → 전주 화약 → 집강소 설치 → 우금치 전투','고부 민란 → 전주 화약 → 황토현 전투 → 우금치 전투 → 집강소 설치','황토현 전투 → 고부 민란 → 집강소 설치 → 전주 화약 → 우금치 전투','전주 화약 → 고부 민란 → 황토현 전투 → 우금치 전투 → 집강소 설치','고부 민란 → 황토현 전투 → 집강소 설치 → 전주 화약 → 우금치 전투'],answer:0,exp:'동학 농민 운동 전개 순서: ①고부 민란(1894.1, 조병갑 탐학, 사발통문) → ②황토현·황룡촌 전투(4~5월, 관군 격파) → ③전주성 점령(5월) → ④전주 화약(5월, 폐정개혁안 건의+집강소 설치 합의) → ⑤집강소 설치(폐정개혁 실시) → ⑥일본군 경복궁 점령·청일전쟁 발발 → ⑦2차 봉기(9월) → ⑧우금치 전투(11월, 패배). 전주 화약이 먼저, 집강소 설치가 그 결과임에 유의합니다.'},
{r:6,src:'예상',q:'신민회(1907~1911)의 활동으로 옳지 않은 것은?',choices:['안창호, 양기탁 등이 비밀리에 결성하였다.','태극 서관을 운영하여 계몽 서적을 보급하였다.','대성 학교와 오산 학교를 설립하였다.','만민공동회를 개최하여 열강의 이권 침탈을 비판하였다.','105인 사건으로 와해되었다.'],answer:3,exp:'만민공동회는 독립협회(1896~1898)의 활동입니다. 신민회(1907~1911): 안창호·양기탁·이승훈 등이 비밀리에 결성한 항일 비밀 결사. 활동: ①태극 서관(평양) 운영—민족 계몽 서적 보급, ②대성학교(평양, 안창호)·오산학교(정주, 이승훈) 설립, ③국외 독립군 기지 건설 추진(만주 삼원보 등), ④데라우치 총독 암살 미수로 조작된 105인 사건(1911)으로 와해. 신민회는 공화정 수립을 목표로 한 최초의 근대적 민족 운동 단체였습니다.'},
{r:6,src:'예상',q:'갑오개혁(1894)에 대한 설명으로 옳지 않은 것은?',choices:['1차 갑오개혁으로 군국기무처가 설치되었다.','2차 갑오개혁에서 홍범 14조가 반포되었다.','1차 갑오개혁에서 과거제와 공사 노비제가 폐지되었다.','을미개혁에서 단발령과 태양력이 채택되었다.','갑오개혁은 일본의 내정 간섭 없이 자주적으로 추진되었다.'],answer:4,exp:'갑오개혁(1894~1896)은 일본의 경복궁 점령 이후 친일 내각이 추진한 개혁으로, 일본의 영향 하에 이루어졌습니다. 1차(1894.6~12): 군국기무처 설치, 과거제·공사 노비제 폐지, 은본위 화폐, 개국 기년 사용. 2차(1894.12~1895.7): 홍범 14조 반포, 내각제 시행, 8아문→23부, 사법권·행정권 분리. 을미개혁(1895): 을미사변 이후 단발령·태양력·건양 연호·친위대·진위대 설치. 을미사변으로 민성황후가 시해된 직후 추진되어 국민들의 강한 반발(을미의병)을 불러일으켰습니다.'},
{r:6,src:'예상',q:'을미사변(1895)에 대한 설명으로 옳은 것은?',choices:['청나라 군인들이 경복궁에 침입하여 명성황후를 시해하였다.','일본 공사 미우라 고로의 지휘 아래 일본 낭인들이 명성황후를 시해하였다.','이 사건 직후 을사늑약이 체결되었다.','고종은 이 사건 직후 대한제국을 선포하였다.','이 사건의 배경은 러·일 전쟁의 패배였다.'],answer:1,exp:'을미사변(1895.8.20): 일본 공사 미우라 고로의 지휘 아래 일본 낭인(浪人)들이 경복궁 건청궁에 침입하여 명성황후(민비)를 시해한 사건. 배경: 명성황후가 삼국 간섭 이후 러시아를 이용하여 일본을 견제하는 인아거일 정책을 추진하자 일본이 제거. 영향: ①을미의병(단발령+명성황후 시해에 분노), ②아관파천(1896, 고종이 러시아 공사관으로 이동). 대한제국 선포는 1897년, 을사늑약은 1905년입니다.'},

{r:7,src:'74회 38번',q:'1930년대 한국독립군에 대한 설명으로 옳은 것은?',choices:['청산리에서 일본군에 맞서 승리를 거두었다.','미국과 연계하여 국내 진공 작전을 준비하였다.','동북 항일 연군으로 개편되어 유격전을 전개하였다.','쌍성보, 대전자령 전투 등에서 일본군에 승리하였다.','중국 관내에서 결성된 최초의 한인 무장 부대였다.'],answer:3,exp:'한국독립군(총사령관 지청천): 북만주에서 한국독립당 산하 군사 조직. ①쌍성보 전투(1932.8), ②대전자령 전투(1933.6)에서 중국 호로군과 한중 연합 작전으로 일본군을 격파. ①청산리 대첩은 북로군정서군(김좌진, 1920), ②국내 진공 작전 준비는 한국광복군(1940년대), ③동북항일연군으로 개편된 것은 중국 공산당 계열의 조선인 부대, ⑤중국 관내 최초 한인 무장 부대는 조선의용대(김원봉, 1938)입니다.'},
{r:7,src:'75회 37번',q:'박상진 등이 1915년 대구에서 조직한 (가) 단체의 특징으로 옳은 것은?',choices:['군대식 조직을 갖춘 비밀 결사였다.','정우회 선언의 영향으로 결성되었다.','조선 혁명 선언을 활동 지침으로 삼았다.','중국군과 함께 영릉가 전투에서 큰 전과를 올렸다.','만민 공동회를 열어 열강의 이권 침탈을 비판하였다.'],answer:0,exp:'대한광복회(1915): 박상진·채기중 등이 대구에서 결성한 항일 무장 비밀 결사. 특징: ①군대식 조직(총사령·부사령·독판 등), ②군자금 모금·친일 부호 처단, ③국내외 독립군 기지 건설 목표, ④공화정 수립 지향. ①맞음. ②정우회 선언은 1926년(신간회 결성의 배경), ③조선혁명선언은 의열단, ④영릉가 전투는 조선혁명군(양세봉), ⑤만민공동회는 독립협회입니다.'},
{r:7,src:'76회 38번',q:'김원봉이 1919년 지린성에서 조직한 (가) 단체에 대한 설명으로 옳은 것은?',choices:['신흥 강습소를 세워 독립군을 양성하였다.','구미 위원부를 설치하여 외교 활동을 전개하였다.','단원인 이봉창이 일왕 행렬에 폭탄을 투척하였다.','조선 혁명 선언을 통해 이념과 활동 방침을 밝혔다.','조선 총독부에 국권 반환 요구서를 제출하고자 하였다.'],answer:3,exp:'김원봉이 1919년 지린성에서 윤세주 등과 창립한 단체는 의열단(義烈團)입니다. 의열단 특징: ①일제 식민 통치 기관 파괴·요인 암살 목표, ②신채호가 작성한 「조선혁명선언(1923)」을 활동 지침으로 채택—"민중의 직접 혁명"을 주장, ③김익상(조선총독부 폭탄 투척, 1921), 김상옥(종로경찰서 폭탄 투척, 1923), 나석주(동양척식주식회사·조선식산은행 폭탄 투척, 1926). ①신흥강습소는 신민회, ②구미위원부는 임시정부, ③이봉창 의거는 한인애국단, ⑤국권 반환 요구서는 독립의군부입니다.'},
{r:7,src:'77회 38번',q:'조선 민족의 총역량을 집중하여 민족 단일당 결성을 촉진하며 조직되었고 각도 지회 설치 후 민중 대회 준비 중 발각되어 해소된 (가) 단체의 활동으로 옳은 것은?',choices:['개벽, 신여성 등의 잡지를 발행하였다.','중추원 개편을 통해 의회 설립을 추진하였다.','군사 조직으로 한인 국방 경위대를 창설하였다.','순종의 인산일을 기회로 만세 운동을 계획하였다.','광주 학생 항일 운동에 진상 조사단을 파견하였다.'],answer:4,exp:'민족 단일당, 지회 설치, 민중 대회, 5년 만에 해소(1927~1931)는 신간회(新幹會)입니다. 신간회 활동: ①1927년 결성(이상재 초대 회장)—민족주의 계열+사회주의 계열의 민족 협동 전선, ②전국 140여 지회·회원 4만여 명, ③광주학생항일운동(1929) 진상 조사단 파견(민중 대회 추진—발각으로 지도부 구속), ④1931년 자진 해소. ①개벽·신여성은 천도교(1920년대), ②중추원 개편 추진은 독립협회, ③한인국방경위대는 미주 지역, ④순종 인산일은 6·10 만세운동.'},
// 예상
{r:7,src:'예상',q:'3·1 운동(1919)에 대한 설명으로 옳지 않은 것은?',choices:['도쿄 유학생들의 2·8 독립 선언이 영향을 주었다.','고종의 인산일을 기회로 삼아 추진되었다.','대한민국 임시정부 수립의 계기가 되었다.','일제가 이른바 문화통치 정책으로 바꾸는 계기가 되었다.','신간회의 주도로 전국적으로 확산되었다.'],answer:4,exp:'신간회는 1927년 결성된 단체로 3·1 운동(1919) 당시에는 존재하지 않았습니다. 3·1 운동: ①배경—2·8 독립 선언(1919.2, 도쿄 유학생), 고종 서거와 인산일, 윌슨의 민족 자결주의, ②전개—1919.3.1 민족 대표 33인의 독립선언서 발표, 전국·해외로 확산, ③일제의 탄압—헌병 경찰의 발포·학살(수원 제암리 학살 등), ④결과—일제의 통치 방식을 무단통치→문화통치로 전환, 대한민국 임시정부(상하이, 1919.4) 수립.'},
{r:7,src:'예상',q:'1910년대 일제의 무단통치 정책으로 옳은 것은?',choices:['회사령을 폐지하여 기업 설립을 자유화하였다.','헌병 경찰이 즉결 처분과 태형을 실시하였다.','농촌 진흥 운동으로 자력갱생을 강조하였다.','황국신민서사 암송과 창씨개명을 강요하였다.','신간회를 허용하는 등 문화통치를 표방하였다.'],answer:1,exp:'1910년대 무단통치(헌병경찰통치): ①헌병 경찰 제도—일반 경찰 업무를 헌병이 담당, ②즉결 처분 권한—재판 없이 태형(매질) 가능, ③조선 태형령(1912)—조선인에게만 적용, ④회사령(1910)—회사 설립 시 총독 허가 필요(민족 자본 성장 억제), ⑤토지조사사업(1910~1918)—신고하지 않은 토지 국유화. ①회사령 폐지는 1920년대 문화통치, ③농촌진흥운동은 1930년대, ④황국신민서사·창씨개명은 1930년대 말~1940년대, ⑤문화통치는 1919년 3·1 운동 이후입니다.'},
{r:7,src:'예상',q:'봉오동 전투와 청산리 대첩에 대한 설명으로 옳게 연결된 것은?',choices:['봉오동-홍범도(대한독립군), 청산리-김좌진(북로군정서군)','봉오동-김좌진(북로군정서군), 청산리-홍범도(대한독립군)','봉오동-안중근, 청산리-윤봉길','봉오동-조선의용대, 청산리-한국광복군','봉오동-지청천(한국독립군), 청산리-양세봉(조선혁명군)'],answer:0,exp:'봉오동 전투(1920.6): 홍범도의 대한독립군이 봉오동 골짜기로 일본군을 유인하여 매복 전술로 대승. 청산리 대첩(1920.10): 김좌진의 북로군정서군이 주력이 되고 홍범도의 연합부대가 합류하여 백운평·완루구·어랑촌 등 10여 회 전투에서 일본군에 대승. 이후 일제의 간도참변(1920.10~11)→자유시 참변(1921)→미쓰야 협정(1925)으로 이어졌습니다. 안중근은 1909년 이토 히로부미 사살, 윤봉길은 1932년 상하이 홍커우 공원 의거입니다.'},
{r:7,src:'예상',q:'대한민국 임시정부에 대한 설명으로 옳지 않은 것은?',choices:['1919년 상하이에서 수립되었다.','연통제를 운영하고 교통국을 설치하였다.','이승만 대통령, 이후 박은식 대통령이 취임하였다.','조소앙의 삼균주의를 기초로 건국 강령을 발표하였다.','독립공채를 발행하고 구미위원부를 설치하여 외교 활동을 전개하였다.'],answer:2,exp:'임시정부 대통령 순서: 이승만(1919~1925) → 박은식(1925, 단기) → 이후 국무령 체제(이상룡 등) → 집단지도체제 → 김구(주석, 1940~1945). "이승만 대통령, 이후 박은식 대통령"은 일부 맞으나 선지 자체가 완전히 정확하지는 않습니다. 임시정부 주요 활동: ①연통제(비밀 행정 조직)·교통국(정보 통신), ②독립공채 발행, ③구미위원부(미국 외교 활동), ④1941년 삼균주의 건국 강령, ⑤1940년 한국광복군 창설(충칭).'},
{r:7,src:'예상',q:'일제의 1930년대 후반 이후 전시 동원 체제에 해당하지 않는 것은?',choices:['국가 총동원법을 시행하여 인력과 물자를 강제 동원하였다.','황국신민서사 암송과 창씨개명을 강요하였다.','여자 정신 근로령을 공표하여 여성을 강제 동원하였다.','산미 증식 계획을 추진하여 쌀 생산량을 늘렸다.','징병제와 강제 징용으로 조선인을 전쟁에 동원하였다.'],answer:3,exp:'산미 증식 계획(1920~1934)은 1920년대 문화통치 시기 일제가 쌀 생산 증가를 통해 일본 내 식량 부족을 해결하려 한 정책입니다. 1930년대 후반~1945년 전시 동원 체제: ①국가 총동원법(1938)—인력·물자 강제 동원 법적 근거, ②황국신민서사(1937)—"우리는 대일본제국의 신민입니다" 암송 강요, ③창씨개명(1940)—한국식 성명을 일본식으로 바꾸도록 강요, ④여자 정신 근로령(1944)—여성 강제 노동, ⑤징병제(1944)·징용제—전쟁 동원.'},
{r:7,src:'예상',q:'신간회(1927~1931)에 대한 설명으로 옳은 것은?',choices:['물산장려운동과 민립대학건립운동을 주도하였다.','민족주의 계열과 사회주의 계열이 연합한 민족 협동 전선이었다.','군대식 조직으로 무장 투쟁을 전개하였다.','일본이 허용한 합법적 정치 결사 활동을 거부하였다.','6·10 만세운동의 영향으로 결성된 단체이다.'],answer:1,exp:'신간회는 1926년 정우회 선언(사회주의 계열의 민족주의 계열과의 연대 선언) 이후 1927년 결성된 민족 협동 전선입니다. 이상재(초대 회장)·안재홍(민족주의) + 홍명희(사회주의) 등 양 진영 연합. 특징: ①합법적 정치 단체(일제의 허가 하에 활동), ②전국 140여 지회, ③광주학생항일운동 진상 조사단 파견, ④기회주의 배격, ⑤1931년 자진 해소(코민테른 방침 변화+일제 탄압). 물산장려운동·민립대학운동은 1920년대 초반 별도 운동입니다.'},
{r:7,src:'예상',q:'의열단 단원들의 의거 활동을 순서대로 바르게 나열한 것은?',choices:['박재혁(부산경찰서) → 김익상(조선총독부) → 김상옥(종로경찰서) → 나석주(동양척식주식회사)','김익상(조선총독부) → 박재혁(부산경찰서) → 나석주 → 김상옥','나석주 → 김상옥 → 박재혁 → 김익상','김상옥 → 나석주 → 김익상 → 박재혁','박재혁 → 나석주 → 김익상 → 김상옥'],answer:0,exp:'의열단 주요 의거 연도: ①박재혁—1920년 부산경찰서 폭탄 투척, ②최수봉—1920년 밀양경찰서, ③김익상—1921년 조선총독부 폭탄 투척, ④김상옥—1923년 종로경찰서 폭탄 투척, ⑤나석주—1926년 동양척식주식회사·조선식산은행 폭탄 투척. 의열단은 1919년 창립 후 1920~1926년에 걸쳐 활발한 직접 행동을 전개하였습니다.'},
{r:7,src:'예상',q:'조선혁명군에 대한 설명으로 옳은 것은?',choices:['지청천을 총사령으로 북만주에서 활동하였다.','양세봉의 지휘로 영릉가·흥경성 전투에서 승리하였다.','중국 관내에서 결성된 최초의 한인 무장 부대였다.','미국의 지원을 받아 국내 진공 작전을 준비하였다.','봉오동 전투에서 일본군을 크게 격퇴하였다.'],answer:1,exp:'조선혁명군(총사령관 양세봉): 조선혁명당 산하 군사 조직, 남만주에서 활동. 주요 전투: ①영릉가 전투(1932)·흥경성 전투(1933)—중국 의용군과 한중 연합 작전으로 일본군 격파. 양세봉은 1934년 일본 밀정에 의해 암살되었습니다. 한국독립군(지청천)은 북만주, 조선혁명군(양세봉)은 남만주에서 활동—반드시 구별하여 암기. ①지청천은 한국독립군, ③중국 관내 최초 한인 무장 부대는 조선의용대(1938), ④국내 진공 작전은 한국광복군, ⑤봉오동 전투는 홍범도입니다.'},

{r:8,src:'74회 46번',q:'2·28 민주 운동과 마산 3·15 의거가 도화선이 된 (가) 민주화 운동에 대한 설명으로 옳은 것은?',choices:['시위 도중 대학생 이한열이 희생되었다.','시민군이 조직되어 계엄군에 저항하였다.','허정 과도 정부가 출범하는 계기가 되었다.','5년 단임의 대통령 직선제 개헌을 이끌어냈다.','야당 총재의 국회의원직 제명으로 촉발되었다.'],answer:2,exp:'2·28 민주 운동(대구, 1960.2.28)과 3·15 의거(마산)가 도화선이 된 운동은 4·19 혁명(1960)입니다. 4·19 혁명 전개: 3·15 부정선거 → 마산 의거 → 김주열 시신 발견 → 4.19 대규모 시위 → 이승만 대통령 하야(4.26) → 허정 과도 정부 출범 → 내각책임제 개헌 → 장면 내각 수립. ①이한열 사망은 6월 민주항쟁(1987), ②시민군 조직은 5·18 민주화 운동(1980), ④5년 단임 직선제 개헌은 6월 민주항쟁 결과, ⑤야당 총재 제명이 촉발은 부마 민주항쟁(1979) 배경입니다.'},
{r:8,src:'74회 49번',q:'6·15 공동 선언 계승, 평화번영 정책 추진을 언급한 연설문. 이 정부 시기의 통일 노력으로 옳은 것은?',choices:['판문점에서 남북 정상 회담을 개최하였다.','남북한이 국제 연합(UN)에 동시 가입하였다.','남북 이산가족의 고향 방문을 최초로 성사시켰다.','평화 통일 외교 정책에 관한 6·23 특별 성명을 발표하였다.','남북 간 경제 교류 활성화를 위한 개성 공단 착공식을 열었다.'],answer:4,exp:'6·15 공동선언(2000, 김대중 정부)을 계승하고 평화번영 정책을 추진한 정부는 노무현 정부(2003~2008)입니다. 노무현 정부 통일 정책: ①개성공단 착공(2003), ②10·4 남북 공동선언(2007, 2차 남북 정상회담—평양). ①판문점 정상회담은 문재인 정부(2018), ②UN 동시가입은 노태우 정부(1991), ③이산가족 고향방문 최초는 전두환 정부(1985), ④6·23 특별 성명은 박정희 정부(1973)입니다.'},
{r:8,src:'75회 46번',q:'6·25 전쟁 중 부산 임시 국회에서 기립 표결로 통과된 발췌 개헌 이후 이 정부(이승만) 시기에 있었던 사실로 옳은 것은?',choices:['경부 고속 도로가 개통되었다.','한미 상호 방위 조약이 체결되었다.','함평 고구마 피해 보상 운동이 전개되었다.','대통령 긴급 명령으로 금융 실명제가 실시되었다.','사회 정화를 명분으로 삼청 교육대가 설치되었다.'],answer:1,exp:'발췌 개헌(1952): 이승만이 자신에게 불리한 간선제 개헌안 대신 직선제 개헌안을 군경을 동원하여 기립 표결로 통과시킨 사건. 이승만 정부(1948~1960) 시기 한미 상호방위조약 체결(1953.10, 6·25 정전 직후). ①경부 고속도로는 박정희 정부(1970), ③함평 고구마 피해 보상은 전두환 시기(1980), ④금융 실명제는 김영삼 정부(1993), ⑤삼청 교육대는 전두환 정부(1980)입니다.'},
{r:8,src:'76회 49번',q:'서울 올림픽 성공 후 헝가리 방문, 7·7 선언의 성과. 이 정부 시기의 통일 노력으로 옳은 것은?',choices:['남북 조절위원회가 구성되었다.','남북한이 유엔에 동시 가입하였다.','금강산 해로 관광 사업이 시작되었다.','개성에 남북 경제 협력 협의 사무소가 설치되었다.','최초로 남북 이산가족 고향 방문단 교환이 이루어졌다.'],answer:1,exp:'서울 올림픽(1988), 7·7 선언(민족자존·통일번영 선언), 헝가리 수교는 노태우 정부(1988~1993)입니다. 노태우 정부 통일 관련 업적: ①남북 고위급 회담 개최, ②남북한 UN 동시 가입(1991.9), ③남북기본합의서(1991.12) 채택, ④한반도 비핵화 공동 선언(1992). ①남북 조절위원회는 박정희 정부(7·4 남북공동성명, 1972), ③금강산 관광은 김대중 정부(1998), ④개성 남북경협사무소는 노무현 정부, ⑤최초 이산가족 방문은 전두환 정부(1985)입니다.'},
{r:8,src:'77회 47번',q:'수출 100억 달러 달성, 행정 수도 건설 계획(충남 공주 장기면). (가) 정부 시기에 있었던 사실로 옳은 것은?',choices:['최저 임금 위원회가 설치되었다.','포항 제철소 1기 설비가 준공되었다.','전국 민주 노동조합 총연맹이 창립되었다.','칠레와의 자유 무역 협정(FTA)이 체결되었다.','경제 협력 개발 기구(OECD) 회원국이 되었다.'],answer:1,exp:'수출 100억 달러 달성(1977), 행정 수도 건설 계획은 박정희 정부(1961~1979)입니다. 포항 제철소: 1고로(1973, 1기 설비 준공)~4고로(1983)까지 단계적 건설. 박정희 정부 경제: 경제 개발 5개년 계획(1962~), 경부 고속도로(1970), 새마을 운동, 중화학공업 육성. ①최저임금위원회는 전두환 정부(1986), ③민주노총 창립은 김영삼 정부(1995), ④칠레 FTA는 노무현 정부(2004), ⑤OECD 가입은 김영삼 정부(1996)입니다.'},

{r:8,src:'예상',q:'6·25 전쟁의 전개 과정을 순서대로 나열한 것은?',choices:['북한군 남침 → 인천상륙작전 → 압록강 진출 → 중국군 참전 → 1·4 후퇴 → 정전 협정','인천상륙작전 → 북한군 남침 → 1·4 후퇴 → 압록강 진출 → 정전 협정','북한군 남침 → 압록강 진출 → 중국군 참전 → 인천상륙작전 → 정전 협정','인천상륙작전 → 북한군 남침 → 중국군 참전 → 1·4 후퇴 → 정전 협정','북한군 남침 → 중국군 참전 → 인천상륙작전 → 압록강 진출 → 1·4 후퇴 → 정전 협정'],answer:0,exp:'6·25 전쟁 전개 순서: ①북한군 남침(1950.6.25) → ②부산 임시 수도, 낙동강 방어선 구축 → ③인천상륙작전(1950.9.15, 맥아더 장군) → ④서울 수복(9.28), 38선 돌파 → ⑤압록강 진출(10월) → ⑥중국군 참전(10월) → ⑦1·4 후퇴(1951.1.4, 서울 재함락) → ⑧38도선 근처 교착 → ⑨판문점 정전 협정(1953.7.27). 한미 상호방위조약(1953.10) 체결.'},
{r:8,src:'예상',q:'5·18 민주화 운동(1980)에 대한 설명으로 옳은 것은?',choices:['이한열의 사망이 운동 확산의 계기가 되었다.','전두환의 비상계엄 확대에 반발하여 시민군이 조직되었다.','5년 단임 대통령 직선제 개헌을 이끌어냈다.','허정 과도 정부 출범의 계기가 되었다.','3·15 부정선거에 항거하여 일어났다.'],answer:1,exp:'5·18 민주화 운동(1980.5.18~5.27): 10·26 사태(박정희 피살) 이후 전두환 등 신군부(12·12 사태, 1979)가 권력을 장악하고 비상계엄을 전국으로 확대하자, 광주 시민들이 계엄 해제와 민주화를 요구하며 봉기. 시민군 조직, 계엄군과 충돌—수백 명 사망. 이후 전두환 정부 출범. 2011년 유네스코 세계기록유산 등재. ①이한열은 6월 민주항쟁(1987), ③5년 단임 직선제는 6월 민주항쟁 결과, ④허정 과도정부는 4·19 혁명, ⑤3·15 부정선거는 4·19 혁명 원인.'},
{r:8,src:'예상',q:'김대중 정부(1998~2003)의 정책과 업적으로 옳은 것은?',choices:['금융 실명제를 실시하여 경제 투명성을 높였다.','경부 고속 도로를 개통하였다.','외환 위기를 극복하고 IMF 조기 상환을 이루었다.','칠레와 자유 무역 협정(FTA)을 최초로 체결하였다.','전국 민주 노동조합 총연맹을 창립하였다.'],answer:2,exp:'김대중 정부(1998~2003): ①1997 외환 위기 조기 극복—금 모으기 운동, 구조 조정, IMF 조기 상환(2001), ②노사정 위원회, ③6·15 남북 공동선언(2000, 첫 남북 정상회담)—노벨 평화상 수상, ④2002 FIFA 한일 월드컵, ⑤국민기초생활보장법 제정. ①금융실명제는 김영삼 정부(1993), ②경부고속도로는 박정희 정부(1970), ④칠레 FTA는 노무현 정부(2004), ⑤민주노총 창립은 김영삼 정부(1995)입니다.'},
{r:8,src:'예상',q:'박정희 정부 시기의 사실로 옳지 않은 것은?',choices:['5·16 군사정변으로 국가재건최고회의를 구성하였다.','한일기본조약을 체결하여 국교를 정상화하였다.','유신헌법으로 대통령의 권한을 크게 강화하였다.','6월 민주항쟁으로 대통령 직선제 개헌을 수용하였다.','경제 개발 5개년 계획을 추진하여 고도성장을 이루었다.'],answer:3,exp:'6월 민주항쟁(1987)은 전두환 정부 시기에 일어났으며, 노태우가 6·29 선언(직선제 개헌 수용)을 발표하였습니다. 박정희 정부(1961~1979): ①5·16 군사정변(1961)→국가재건최고회의, ②한일기본조약(1965, 6·3 항쟁), ③10월 유신(1972)—통일주체국민회의로 대통령 선출, 긴급조치권, ④경제 개발 5개년 계획(1962~), ⑤새마을 운동, 중화학공업 육성, 수출 100억 달러(1977). 10·26 사태(1979.10.26)로 피살.'},
{r:8,src:'예상',q:'노태우 정부(1988~1993)의 업적으로 옳지 않은 것은?',choices:['서울 올림픽을 성공적으로 개최하였다.','남북한 유엔 동시 가입을 성사시켰다.','남북기본합의서와 한반도 비핵화 공동 선언을 채택하였다.','금융 실명제를 실시하여 경제 투명성을 높였다.','북방 외교를 추진하여 소련·중국과 수교하였다.'],answer:3,exp:'금융 실명제(1993.8)는 김영삼 정부의 업적입니다. 노태우 정부(1988~1993): ①서울 올림픽 개최(1988), ②7·7 선언(민족자존·통일번영 선언), ③북방 외교—소련(1990), 중국(1992)과 수교, ④남북 UN 동시 가입(1991.9), ⑤남북기본합의서(1991.12)·한반도 비핵화 공동 선언(1992). 노태우 정부는 민주자유당(민정당+통일민주당+공화당 합당) 창당도 단행하였습니다.'},
{r:8,src:'예상',q:'다음 민주화 운동을 발생한 순서대로 바르게 나열한 것은?',choices:['4·19 혁명 → 5·18 민주화 운동 → 6월 민주항쟁 → 부마 민주항쟁','4·19 혁명 → 부마 민주항쟁 → 5·18 민주화 운동 → 6월 민주항쟁','5·18 민주화 운동 → 4·19 혁명 → 부마 민주항쟁 → 6월 민주항쟁','부마 민주항쟁 → 4·19 혁명 → 6월 민주항쟁 → 5·18 민주화 운동','6월 민주항쟁 → 4·19 혁명 → 5·18 민주화 운동 → 부마 민주항쟁'],answer:1,exp:'주요 민주화 운동 연표: ①4·19 혁명(1960)—이승만 독재 타도, ②부마 민주항쟁(1979, 부산·마산)—유신 체제 반대, 박정희 피살(10·26)로 이어짐, ③5·18 민주화 운동(1980, 광주)—신군부(전두환) 비상계엄 확대 반대, ④6월 민주항쟁(1987)—전두환 정부 독재 반대, 박종철 고문치사 사건, 이한열 사망, 결과: 6·29 선언(직선제 개헌). 순서: 4·19 → 부마 → 5·18 → 6월 민주항쟁.'},
{r:8,src:'예상',q:'광복 이후 대한민국 정부 수립 과정을 순서대로 나열한 것은?',choices:['광복 → 5·10 총선거 → 모스크바 3국 외상 회의 → 미군정 → 대한민국 정부 수립','광복 → 미군정 → 모스크바 3국 외상 회의 → 좌우합작운동 → 5·10 총선거 → 대한민국 정부 수립','광복 → 대한민국 정부 수립 → 5·10 총선거 → 모스크바 3국 외상 회의','광복 → 좌우합작운동 → 5·10 총선거 → 모스크바 3국 외상 회의 → 대한민국 정부 수립','광복 → 미군정 → 5·10 총선거 → 좌우합작운동 → 대한민국 정부 수립'],answer:1,exp:'광복~대한민국 정부 수립 순서: ①광복(1945.8.15) → ②미군정 시작(1945.9) → ③모스크바 3국 외상 회의(1945.12)—신탁통치 결정, 찬탁·반탁 대립 → ④이승만 정읍 발언(1946.6, 단독정부론) → ⑤좌우합작운동(1946~1947, 여운형·김규식 주도) → ⑥UN 한국임시위원단 입국(1947) → ⑦남한만의 선거 결정 → ⑧5·10 총선거(1948.5.10)—최초 보통 선거, 제헌국회 구성 → ⑨제헌헌법 공포(7.17) → ⑩대한민국 정부 수립(1948.8.15).'},

let selectedRanges = new Set();

function toggleRange(r) {
  if (selectedRanges.has(r)) selectedRanges.delete(r);
  else selectedRanges.add(r);
  document.querySelectorAll('.range-btn').forEach(b => {
    const ri = parseInt(b.dataset.range);
    b.classList.toggle('active', selectedRanges.has(ri));
  });
  updateSelectAllBtn();
  updateStartHint();
}

function toggleSelectAll() {
  if (selectedRanges.size === 9) {
    selectedRanges.clear();
  } else {
    for (let i = 0; i < 9; i++) selectedRanges.add(i);
  }
  document.querySelectorAll('.range-btn').forEach(b => {
    b.classList.toggle('active', selectedRanges.has(parseInt(b.dataset.range)));
  });
  updateSelectAllBtn();
  updateStartHint();
}

function updateSelectAllBtn() {
  const btn = document.getElementById('select-all-btn');
  if (selectedRanges.size === 9) {
    btn.textContent = '☑ 전체 선택됨 (클릭하면 해제)';
    btn.classList.add('all-active');
  } else {
    btn.textContent = '☑ 전체 선택';
    btn.classList.remove('all-active');
  }
}

function updateStartHint() {
  const cnt = selectedRanges.size;
  const hint = document.getElementById('range-hint');
  const btn = document.getElementById('btn-start');
  if (cnt === 0) {
    hint.textContent = '범위를 선택하면 시작할 수 있습니다';
    btn.classList.remove('ready');
  } else {
    hint.textContent = `${cnt}개 범위 선택됨 · 총 50문제가 출제됩니다`;
    btn.classList.add('ready');
  }
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  if (selectedRanges.size === 0) return;
  const ranges = [...selectedRanges].sort((a, b) => a - b);
  const TOTAL = 50;
  const poolByRange = {};
  for (const r of ranges) {
    poolByRange[r] = shuffle(QUESTIONS.filter(q => q.r === r));
  }
  const totalWeight = ranges.reduce((s, r) => s + RANGE_WEIGHTS[r], 0);
  const alloc = {};
  let allocated = 0;
  for (const r of ranges) {
    alloc[r] = Math.max(1, Math.round(RANGE_WEIGHTS[r] / totalWeight * TOTAL));
    allocated += alloc[r];
  }
  while (allocated > TOTAL) {
    const maxR = ranges.reduce((a, b) => alloc[a] > alloc[b] ? a : b);
    alloc[maxR]--;
    allocated--;
  }
  while (allocated < TOTAL) {
    let best = ranges[0];
    for (const r of ranges) {
      if (poolByRange[r].length > alloc[r] && alloc[r] <= alloc[best]) best = r;
    }
    alloc[best]++;
    allocated++;
  }
  const collected = [];
  for (const r of ranges) {
    const pool = poolByRange[r];
    const need = Math.min(alloc[r], pool.length);
    for (let i = 0; i < need; i++) collected.push(pool[i]);
  }
  if (collected.length < TOTAL) {
    const fallback = shuffle(QUESTIONS.filter(q => ranges.includes(q.r)));
    for (const q of fallback) {
      if (collected.length >= TOTAL) break;
      if (!collected.includes(q)) collected.push(q);
    }
  }
  quizQuestions = collected.slice(0, TOTAL);
  // 각 문제 보기 셔플
  shuffledChoices = quizQuestions.map(q => {
    const correct = q.choices[q.answer];
    const pool = shuffle([...q.choices]);
    const newAns = pool.indexOf(correct);
    return { pool, newAns };
  });
  currentIdx = 0;
  score = 0;
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('live-score').textContent = 0;
  renderQ();
}

function renderQ() {
  answered = false;
  selectedChoiceIdx = -1;
  const q = quizQuestions[currentIdx];
  const sc = shuffledChoices[currentIdx];
  const total = quizQuestions.length;
  document.getElementById('cur-q').textContent = currentIdx + 1;
  document.getElementById('prog-fill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';
  document.getElementById('exp-wrong-note').style.display = 'none';
  document.getElementById('exp-correct-note').style.display = 'none';
  const confirmBtn = document.getElementById('btn-confirm');
  confirmBtn.style.display = 'block';
  confirmBtn.classList.remove('ready');
  document.getElementById('q-range-badge').innerHTML =
    RANGE_NAMES[q.r] + ' <span class="q-source">[' + q.src + ']</span>';
  const srcBox = document.getElementById('q-srcbox');
  if (q.sbox) { srcBox.style.display = ''; srcBox.innerHTML = q.sbox; }
  else srcBox.style.display = 'none';
  document.getElementById('q-text').textContent = q.q;
  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'choices';
  const labels = ['①','②','③','④','⑤'];
  sc.pool.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${labels[i]}</span><span>${text}</span>`;
    btn.onclick = () => selectChoice(i, btn, div);
    div.appendChild(btn);
  });
  area.appendChild(div);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function selectChoice(idx, btn, div) {
  if (answered) return;
  selectedChoiceIdx = idx;
  const btns = div.querySelectorAll('.choice-btn');
  btns.forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('btn-confirm').classList.add('ready');
}

function confirmAnswer() {
  if (selectedChoiceIdx < 0 || answered) return;
  answered = true;
  const q = quizQuestions[currentIdx];
  const sc = shuffledChoices[currentIdx];
  const div = document.querySelector('.choices');
  const btns = div.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const labels = ['①','②','③','④','⑤'];
  btns[sc.newAns].classList.remove('selected');
  btns[sc.newAns].classList.add('correct');
  const isCorrect = selectedChoiceIdx === sc.newAns;
  if (!isCorrect) {
    btns[selectedChoiceIdx].classList.remove('selected');
    btns[selectedChoiceIdx].classList.add('wrong');
  } else {
    score++;
  }
  document.getElementById('live-score').textContent = score;
  document.getElementById('btn-confirm').style.display = 'none';
  // 해설
  const expEl = document.getElementById('explanation');
  const wrongNote = document.getElementById('exp-wrong-note');
  const correctNote = document.getElementById('exp-correct-note');
  if (isCorrect) {
    wrongNote.style.display = 'none';
    correctNote.style.display = 'block';
    correctNote.textContent = '✅ 정답입니다!';
  } else {
    wrongNote.style.display = 'block';
    wrongNote.textContent = `❌ 오답 선택 (내 선택: ${labels[selectedChoiceIdx]}  |  정답: ${labels[sc.newAns]})`;
    correctNote.style.display = 'none';
  }
  document.getElementById('exp-text').textContent = q.exp;
  expEl.style.display = 'block';
  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent = currentIdx < quizQuestions.length - 1 ? '다음 문제 →' : '결과 보기 🏁';
  nb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQuestions.length) showResult();
  else renderQ();
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';
  const total = quizQuestions.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('res-score').textContent = score;
  document.getElementById('bc-cnt').textContent = score;
  document.getElementById('bw-cnt').textContent = total - score;
  setTimeout(() => {
    document.getElementById('bar-c').style.width = (score / total * 100) + '%';
    document.getElementById('bar-w').style.width = ((total - score) / total * 100) + '%';
  }, 200);
  let icon, title, msg, cls;
  if (pct >= 90) { icon='🏆'; title='목표 달성!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n78회 심화 100점도 노려볼 수 있습니다!`; cls='score-excellent'; }
  else if (pct >= 80) { icon='🎯'; title='거의 다 왔어요!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 복습하면 90점 목표 달성!`; cls='score-good'; }
  else if (pct >= 60) { icon='📖'; title='더 공부해요!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n틀린 단원을 중심으로 재도전해 보세요.`; cls='score-ok'; }
  else { icon='💪'; title='다시 도전!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n개념 노트를 먼저 복습하고 다시 도전!`; cls='score-low'; }
  document.getElementById('res-icon').textContent = icon;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-score-wrap').className = 'result-score ' + cls;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}
</script>
