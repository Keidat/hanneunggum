<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국사능력검정시험 심화 대비 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0e0c;
  --surface: #1a1814;
  --card: #221f1a;
  --border: #3a3530;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: rgba(201,168,76,0.15);
  --red: #c94c4c;
  --red-dim: rgba(201,76,76,0.12);
  --green: #4caa7a;
  --green-dim: rgba(76,170,122,0.12);
  --text: #e8e0d0;
  --text-muted: #7a7060;
  --text-dim: #5a5045;
  --selected: rgba(201,168,76,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── START SCREEN ── */
#start-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;position:relative}
#start-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(201,168,76,0.06) 0%,transparent 70%);pointer-events:none}
.title-badge{font-family:'Noto Serif KR',serif;font-size:.72rem;letter-spacing:.25em;color:var(--gold);border:1px solid rgba(201,168,76,0.35);padding:.4rem 1.2rem;margin-bottom:2rem;text-transform:uppercase}
.main-title{font-family:'Noto Serif KR',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:900;text-align:center;line-height:1.25;margin-bottom:.5rem;background:linear-gradient(160deg,#e8e0d0 0%,#c9a84c 60%,#8a6830 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.main-sub{color:var(--text-muted);font-size:.9rem;text-align:center;margin-bottom:2.5rem;line-height:1.8}
.info-row{display:flex;gap:1.5rem;margin-bottom:2.5rem;flex-wrap:wrap;justify-content:center}
.info-chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem 1.2rem;font-size:.8rem;color:var(--text-muted);display:flex;align-items:center;gap:.5rem}
.info-chip strong{color:var(--gold);font-weight:700}

/* range selection */
.range-label{font-size:.78rem;letter-spacing:.1em;color:var(--text-muted);margin-bottom:1rem;text-align:center}
.range-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;width:100%;max-width:640px;margin-bottom:2rem}
.range-btn{background:var(--card);border:1.5px solid var(--border);color:var(--text-muted);padding:.8rem .5rem;border-radius:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:.78rem;text-align:center;transition:all .2s;line-height:1.5;user-select:none}
.range-btn:hover{border-color:var(--gold);color:var(--text)}
.range-btn.active{border-color:var(--gold);background:var(--gold-dim);color:var(--gold-light)}
.range-btn .era{font-size:.65rem;color:var(--text-dim);display:block;margin-top:.2rem}
.range-hint{font-size:.72rem;color:var(--text-dim);text-align:center;margin-bottom:1.5rem}
.btn-start{background:linear-gradient(135deg,#c9a84c,#a07830);color:#0f0e0c;border:none;padding:1rem 3.5rem;border-radius:10px;font-size:1rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;letter-spacing:.05em;opacity:.4;pointer-events:none}
.btn-start.ready{opacity:1;pointer-events:auto}
.btn-start.ready:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,0.3)}

/* ── QUIZ SCREEN ── */
#quiz-screen{display:none;max-width:760px;margin:0 auto;padding:1.5rem 1.2rem 6rem}
.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.q-counter{font-size:.82rem;color:var(--text-muted);letter-spacing:.05em}
.q-counter em{color:var(--gold);font-style:normal;font-size:1.1rem;font-weight:700}
.score-pill{background:var(--card);border:1px solid var(--border);color:var(--green);font-size:.78rem;font-weight:700;padding:.3rem .8rem;border-radius:100px}
.progress-wrap{height:3px;background:var(--border);border-radius:99px;margin-bottom:1.8rem;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#c9a84c,#e8c97a);border-radius:99px;transition:width .4s ease}

/* range badge on question */
.q-range-badge{display:inline-flex;align-items:center;gap:.4rem;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--gold);margin-bottom:.7rem;text-transform:uppercase}
.q-range-badge::before{content:'';display:block;width:5px;height:5px;background:var(--gold);border-radius:50%}
.q-source{font-size:.62rem;color:var(--text-dim);margin-left:.3rem;font-weight:400;letter-spacing:0}

.question-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.6rem;margin-bottom:1.2rem;position:relative;overflow:hidden}
.question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#c9a84c,#8a6830)}
.source-box{background:rgba(255,255,255,0.03);border:0.5px solid var(--border);border-radius:8px;padding:.9rem 1rem;margin-bottom:1rem;font-size:.83rem;color:var(--text-muted);line-height:1.8;font-style:italic}
.source-box strong{color:var(--text);font-style:normal}
.q-text{font-size:1rem;font-weight:500;line-height:1.75;color:var(--text)}

/* choices */
.choices{display:flex;flex-direction:column;gap:.65rem;margin-bottom:1.2rem}
.choice-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);padding:.85rem 1rem;border-radius:9px;text-align:left;font-size:.9rem;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:.75rem;line-height:1.55}
.choice-btn:hover:not(:disabled){border-color:var(--gold);background:var(--gold-dim);transform:translateX(2px)}
.choice-num{min-width:26px;height:26px;border-radius:6px;background:var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:1px;transition:all .15s}
.choice-btn:hover:not(:disabled) .choice-num{background:var(--gold);color:#0f0e0c}
.choice-btn.correct{background:var(--green-dim);border-color:var(--green);color:var(--text)}
.choice-btn.correct .choice-num{background:var(--green);color:#fff}
.choice-btn.wrong{background:var(--red-dim);border-color:var(--red);color:var(--text)}
.choice-btn.wrong .choice-num{background:var(--red);color:#fff}
.choice-btn:disabled{cursor:default}

/* explanation */
.explanation{display:none;background:rgba(201,168,76,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:9px;padding:.9rem 1rem;font-size:.85rem;color:#c8b88a;line-height:1.75;margin-bottom:1.2rem}
.exp-label{font-weight:700;color:var(--gold);margin-bottom:.3rem;display:block;font-size:.72rem;letter-spacing:.1em}

/* next button */
.btn-next{width:100%;background:linear-gradient(135deg,#c9a84c,#a07830);color:#0f0e0c;border:none;padding:1rem;border-radius:11px;font-size:.95rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .15s;display:none;letter-spacing:.05em}
.btn-next:hover{opacity:.9;transform:translateY(-1px)}

/* ── RESULT SCREEN ── */
#result-screen{display:none;max-width:580px;margin:0 auto;padding:3rem 1.5rem;text-align:center;min-height:100vh;align-items:center;justify-content:center;flex-direction:column}
.result-icon{font-size:4.5rem;margin-bottom:1rem;display:block}
.result-title{font-family:'Noto Serif KR',serif;font-size:2rem;font-weight:900;margin-bottom:.5rem}
.result-score{font-size:4rem;font-weight:900;margin:1rem 0;font-family:'Noto Serif KR',serif}
.score-num{color:var(--gold)}
.score-denom{font-size:1.5rem;color:var(--text-muted)}
.result-msg{color:var(--text-muted);font-size:.92rem;margin-bottom:2rem;line-height:1.8;white-space:pre-line}
.bar-section{width:100%;max-width:380px;margin:0 auto 2rem;display:flex;flex-direction:column;gap:.7rem}
.bar-row{display:flex;align-items:center;gap:.7rem;font-size:.82rem}
.bar-label{width:45px;text-align:right;flex-shrink:0}
.bar-track{flex:1;height:9px;background:var(--border);border-radius:99px;overflow:hidden}
.bar-correct{height:100%;background:var(--green);border-radius:99px;transition:width 1s ease}
.bar-wrong{height:100%;background:var(--red);border-radius:99px;transition:width 1s ease}
.bar-count{width:28px;font-weight:700;text-align:left}
.result-btns{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center}
.btn-r{border:none;padding:.85rem 1.5rem;border-radius:10px;font-size:.88rem;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:opacity .15s;letter-spacing:.03em}
.btn-r:hover{opacity:.85}
.btn-r.retry{background:linear-gradient(135deg,#c9a84c,#a07830);color:#0f0e0c}
.btn-r.home{background:var(--card);color:var(--text);border:1.5px solid var(--border)}
.btn-r.home:hover{border-color:var(--gold)}

/* score range colors */
.score-excellent .score-num{color:#e8c97a}
.score-good .score-num{color:var(--green)}
.score-ok .score-num{color:#c9a84c}
.score-low .score-num{color:var(--red)}

@media(max-width:520px){
  .range-grid{grid-template-columns:repeat(2,1fr)}
  .q-text{font-size:.92rem}
  .choice-btn{font-size:.83rem;padding:.75rem .85rem}
}
</style>
</head>
<body>

<!-- ══════════════════ START ══════════════════ -->
<div id="start-screen">
  <div class="title-badge">📜 심화 대비</div>
  <h1 class="main-title">한국사능력검정시험<br>심화 실력 점검</h1>
  <p class="main-sub">74~77회 기출 + 출제 예상 문제<br>78회 목표 점수 90점 이상 달성을 위한 집중 훈련</p>
  <div class="info-row">
    <div class="info-chip">🎯 <strong>50문제</strong> / 회차</div>
    <div class="info-chip">📚 <strong>5지선다</strong> 객관식</div>
    <div class="info-chip">💡 <strong>즉시</strong> 해설 제공</div>
    <div class="info-chip">🔄 <strong>랜덤</strong> 출제</div>
  </div>
  <p class="range-label">공부할 범위를 선택하세요 (중복 선택 가능 · 최소 1개)</p>
  <div class="range-grid">
    <button class="range-btn" data-range="0" onclick="toggleRange(0)">
      ① 선사시대<span class="era">구석기~청동기</span>
    </button>
    <button class="range-btn" data-range="1" onclick="toggleRange(1)">
      ② 고조선·여러나라<span class="era">고조선·삼한·부여</span>
    </button>
    <button class="range-btn" data-range="2" onclick="toggleRange(2)">
      ③ 삼국시대<span class="era">고구려·백제·신라</span>
    </button>
    <button class="range-btn" data-range="3" onclick="toggleRange(3)">
      ④ 통일신라·발해<span class="era">남북국 시대</span>
    </button>
    <button class="range-btn" data-range="4" onclick="toggleRange(4)">
      ⑤ 고려<span class="era">918~1392</span>
    </button>
    <button class="range-btn" data-range="5" onclick="toggleRange(5)">
      ⑥ 조선<span class="era">1392~1863</span>
    </button>
    <button class="range-btn" data-range="6" onclick="toggleRange(6)">
      ⑦ 개화기<span class="era">1863~1910</span>
    </button>
    <button class="range-btn" data-range="7" onclick="toggleRange(7)">
      ⑧ 일제강점기<span class="era">1910~1945</span>
    </button>
    <button class="range-btn" data-range="8" onclick="toggleRange(8)">
      ⑨ 광복~현대<span class="era">1945~현재</span>
    </button>
  </div>
  <p class="range-hint" id="range-hint">범위를 선택하면 시작할 수 있습니다</p>
  <button class="btn-start" id="btn-start" onclick="startQuiz()">시험 시작하기 →</button>
</div>

<!-- ══════════════════ QUIZ ══════════════════ -->
<div id="quiz-screen">
  <div class="quiz-top">
    <div class="q-counter">문제 <em id="cur-q">1</em> / 50</div>
    <div class="score-pill">점수 <span id="live-score">0</span>점</div>
  </div>
  <div class="progress-wrap"><div class="progress-fill" id="prog-fill" style="width:2%"></div></div>
  <div class="question-card" id="q-card">
    <div class="q-range-badge" id="q-range-badge">선사시대 <span class="q-source" id="q-src"></span></div>
    <div class="source-box" id="q-srcbox" style="display:none"></div>
    <div class="q-text" id="q-text"></div>
  </div>
  <div id="choices-area"></div>
  <div class="explanation" id="explanation"><span class="exp-label">💡 해설</span><span id="exp-text"></span></div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()">다음 문제 →</button>
</div>

<!-- ══════════════════ RESULT ══════════════════ -->
<div id="result-screen">
  <span class="result-icon" id="res-icon">🏆</span>
  <h2 class="result-title" id="res-title">수고했습니다!</h2>
  <div class="result-score" id="res-score-wrap">
    <span class="score-num" id="res-score">0</span>
    <span class="score-denom"> / 50</span>
  </div>
  <p class="result-msg" id="res-msg"></p>
  <div class="bar-section">
    <div class="bar-row">
      <span class="bar-label" style="color:var(--green)">정답</span>
      <div class="bar-track"><div class="bar-correct" id="bar-c" style="width:0%"></div></div>
      <span class="bar-count" style="color:var(--green)" id="bc-cnt">0</span>
    </div>
    <div class="bar-row">
      <span class="bar-label" style="color:var(--red)">오답</span>
      <div class="bar-track"><div class="bar-wrong" id="bar-w" style="width:0%"></div></div>
      <span class="bar-count" style="color:var(--red)" id="bw-cnt">0</span>
    </div>
  </div>
  <div class="result-btns">
    <button class="btn-r retry" onclick="startQuiz()">🔄 다시 풀기</button>
    <button class="btn-r home" onclick="goHome()">🏠 범위 선택</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════════
// QUESTION BANK
// ════════════════════════════════════════════════════════════

// range index: 0=선사 1=고조선여러나라 2=삼국 3=통일신라발해 4=고려 5=조선 6=개화기 7=일제 8=현대

const QUESTIONS = [

// ══ 0 선사시대 ══
{r:0, src:'74회 1번', q:'다음 자료에서 (가) 시대의 생활 모습으로 가장 적절한 것은? (서울 암사동 유적 100주년, 빗살무늬 토기·갈돌·갈판 출토, 유구인 집터 발견)', choices:['목책과 환호 등 방어 시설을 갖추었다.','소를 이용한 깊이갈이가 일반화되었다.','농경과 목축을 통해 식량을 생산하였다.','지배층의 무덤으로 고인돌을 축조하였다.','거푸집을 이용하여 세형 동검을 제작하였다.'], answer:2, exp:'암사동 유적은 신석기 시대 대표 유적입니다. 신석기 시대에는 농경과 목축이 시작되어 식량을 생산하게 되었습니다. 빗살무늬 토기, 갈돌, 갈판, 가락바퀴 등이 대표 유물입니다.'},
{r:0, src:'75회 1번', q:'다음 초대장의 (가) 시대 생활 모습으로 가장 적절한 것은? (부여 송국리 유적 발굴 50주년, 사유재산과 계급이 발생한 시대, 송국리형 토기·비파형 동검 출토)', choices:['주먹도끼 등 뗀석기를 처음 제작하였다.','소를 이용한 깊이갈이가 널리 보급되었다.','주로 강가의 동굴이나 막집에 거주하였다.','많은 인력을 동원하여 고인돌을 축조하였다.','가락바퀴를 이용하여 실을 뽑기 시작하였다.'], answer:3, exp:'송국리 유적은 청동기 시대 대표 유적으로, 사유재산과 계급이 발생하였고 지배층의 무덤인 고인돌이 축조되었습니다. 비파형 동검, 반달 돌칼, 민무늬 토기가 대표 유물입니다.'},
{r:0, src:'76회 1번', q:'연천 전곡리 출토 주먹도끼와 관련된 이 시대의 생활 모습으로 옳은 것은?', choices:['민무늬 토기에 식량을 저장하였다.','가락바퀴를 이용하여 실을 만들었다.','명도전, 반량전 등 화폐를 사용하였다.','철제 농기구를 사용하여 농사를 지었다.','주로 동굴이나 강가의 막집에 거주하였다.'], answer:4, exp:'주먹도끼는 구석기 시대 대표 유물로, 전곡리 유적이 대표적입니다. 구석기 시대 사람들은 주로 동굴이나 강가의 막집에 거주하였으며, 이동 생활을 하였습니다.'},
{r:0, src:'77회 1번', q:'여주 흔암리 유적 체험 프로그램(민무늬 토기 맞추기, 반달 돌칼로 벼 이삭 수확, 탄화미 찾기)이 안내하는 이 시대의 생활 모습으로 가장 적절한 것은?', choices:['철제 무기로 정복 활동을 벌였다.','소를 이용한 깊이갈이가 일반화되었다.','많은 인력을 동원하여 고인돌을 축조하였다.','주먹도끼, 찍개 등의 뗀석기를 처음 제작하였다.','가락바퀴와 뼈바늘을 이용하여 옷을 만들기 시작하였다.'], answer:2, exp:'흔암리 유적은 청동기 시대 유적으로, 반달 돌칼(벼 수확), 민무늬 토기, 탄화미가 특징입니다. 청동기 시대에는 계급 발생과 함께 지배층의 무덤인 고인돌이 축조되었습니다.'},
{r:0, src:'예상', q:'구석기 시대의 특징으로 옳지 않은 것은?', choices:['주로 동굴이나 막집에 거주하였다.','뗀석기를 사용하였다.','사냥과 채집으로 식량을 얻었다.','계급이 발생하고 지배층이 등장하였다.','무리를 지어 이동 생활을 하였다.'], answer:3, exp:'계급의 발생과 지배층의 등장은 청동기 시대의 특징입니다. 구석기 시대는 평등한 공동체 사회로, 뗀석기를 사용하며 사냥·채집·이동 생활을 하였습니다.'},

{r:2, src:'74회 5번', q:'고구려 능산리 고분군 중 동하총 현실 벽화(천장 연꽃·구름무늬, 송리 6호분과 함께 고분 벽화 연구에 중요)의 (가) 국가에 대한 설명으로 옳은 것은?', choices:['일길찬, 사찬 등의 관등이 있었다.','지방 장관으로 욕살, 처려근지 등이 있었다.','특산물로 단궁, 과하마, 반어피가 유명하였다.','사회 질서를 유지하기 위해 범금 8조를 두었다.','왕족인 부여씨와 8성 귀족이 지배층을 이루었다.'], answer:4, exp:'능산리 고분은 백제의 것입니다. 백제의 지배층은 왕족인 부여씨와 8성 귀족(진·해·국·사·연·협·목·백씨)으로 구성되었습니다. 욕살은 고구려, 일길찬·사찬은 신라, 범금 8조는 고조선의 특징입니다.'},
{r:2, src:'75회 7번', q:'당이 광주사마 장손사를 보내 수나라 병사의 해골을 묻고 경관을 허물었다. 봄 2월에 왕이 많은 사람을 동원하여 장성을 쌓았다. 이 상황 이후에 있었던 사실로 옳은 것은?', choices:['을지문덕이 살수에서 대승을 거두었다.','고구려가 신라에 침입한 왜를 물리쳤다.','김무력이 관산성에서 백제군을 격파하였다.','연개소문이 정변을 일으켜 권력을 장악하였다.','백제가 평양성을 공격하여 고구려 왕이 전사하였다.'], answer:3, exp:'수나라 침략 후 경관을 허물고 장성을 쌓는 상황은 수당 전쟁 이후 당의 침략에 대비하는 모습입니다(631년경). 이후 642년 연개소문이 영류왕을 시해하고 정변을 일으켜 권력을 장악하였습니다.'},
{r:2, src:'76회 3번', q:'(가) 고구려왕 거련이 백제를 공격하여 개로왕 살해 (나) 백제왕이 고구려 평양성 공격, 고구려왕 사유 전사 (다) 백제왕 명농이 관산성 공격, 도도가 백제왕 죽임. 순서대로 옳게 나열한 것은?', choices:['(가)-(나)-(다)','(가)-(다)-(나)','(나)-(가)-(다)','(나)-(다)-(가)','(다)-(가)-(나)'], answer:2, exp:'(나) 371년 근초고왕이 평양성 공격·고국원왕 전사 → (가) 475년 장수왕이 한성 함락·개로왕 살해 → (다) 554년 관산성 전투·성왕 전사 순입니다.'},
{r:2, src:'76회 6번', q:'국학 설치로 유학 보급, 전국 9주로 행정 구역 정비, 고구려·백제·말갈인을 포함한 9서당 편성. 이 왕에 대한 설명으로 옳은 것은?', choices:['병부를 설치하고 율령을 반포하였다.','관료전을 지급하고 녹읍을 폐지하였다.','화랑도를 국가적인 조직으로 개편하였다.','관리 선발을 위해 독서삼품과를 시행하였다.','국호를 마진으로 바꾸고 도읍을 철원으로 옮겼다.'], answer:1, exp:'국학 설치, 9주 5소경, 9서당 10정 편성은 신라 신문왕(681~692)의 업적입니다. 신문왕은 관료전 지급과 녹읍 폐지로 귀족 세력을 약화시켰습니다. 화랑도 개편은 진흥왕, 독서삼품과는 원성왕의 업적입니다.'},
{r:2, src:'77회 5번', q:'백가의 난 평정, 중국 남조의 양에 국서 발송(고구려 격파 강국 선언), 1971년 발굴 무덤에서 지석과 석수 출토. 이 왕에 대한 설명으로 옳은 것은?', choices:['금마저에 미륵사를 창건하였다.','고흥에게 서기를 편찬하게 하였다.','지방의 22담로에 왕족을 파견하였다.','동진에서 온 마라난타를 통해 불교를 수용하였다.','장군 달기를 보내 고구려의 도살성을 점령하였다.'], answer:2, exp:'무령왕릉은 1971년 발굴되었고, 무령왕은 백가의 난 평정, 중국 남조와 외교 강화, 22담로에 왕족 파견으로 지방 통제를 강화하였습니다. 미륵사는 무왕, 서기 편찬은 근초고왕, 불교 수용(384)은 침류왕 때입니다.'},
{r:2, src:'예상', q:'신라 진흥왕의 업적으로 옳지 않은 것은?', choices:['화랑도를 국가적인 조직으로 개편하였다.','대가야를 정복하여 영토를 확장하였다.','「국사」를 편찬하도록 거칠부에게 명하였다.','독서삼품과를 시행하여 인재를 등용하였다.','황초령·마운령·북한산에 순수비를 세웠다.'], answer:3, exp:'독서삼품과를 시행하여 인재를 등용한 왕은 원성왕입니다. 진흥왕의 업적: 화랑도 개편, 대가야 정복(562), 「국사」 편찬(거칠부), 순수비 건립(황초령·마운령·북한산·창녕).'},
{r:2, src:'예상', q:'백제 성왕에 대한 설명으로 옳은 것은?', choices:['고구려 평양성을 공격하여 고국원왕을 전사시켰다.','사비로 천도하고 국호를 남부여로 고쳤다.','지방에 22담로를 두어 왕족을 파견하였다.','미륵사를 창건하였다.','칠지도를 왜왕에게 보냈다.'], answer:1, exp:'성왕(523~554): 사비 천도, 국호 남부여, 한강 하류 일시 수복, 관산성 전투에서 전사. 평양성 공격은 근초고왕, 22담로는 무령왕, 미륵사는 무왕, 칠지도는 근초고왕의 업적입니다.'},
{r:2, src:'예상', q:'수·당 전쟁에서 고구려의 승리 요인으로 옳지 않은 것은?', choices:['을지문덕의 살수대첩(612년)','연개소문의 강경 외교와 안시성 전투(645년)','천리장성 축조로 당의 침략에 대비','김유신의 지원군 파견으로 전세 역전','요동성 등 국경 방어 체계 구축'], answer:3, exp:'수·당과의 전쟁은 고구려와 수·당 사이의 전쟁으로, 신라 김유신의 지원군은 관련이 없습니다. 을지문덕의 살수대첩, 연개소문의 안시성 전투, 천리장성 축조가 고구려 승리의 요인입니다.'},

{r:3, src:'74회 9번', q:'한국사 동영상 제작 기획안: 신라인으로서 동아시아를 무대로 활약한 000. #1 당으로 건너가 무령군 소장이 되다 / #2 (가) / #3 청해진 설치, 동아시아 무역 주도 / #4 왕위 쟁탈전에 휘말려 암살. (가)에 들어갈 내용으로 가장 적절한 것은?', choices:['화왕계를 지어 국왕에게 바치다','산동반도에 적산 법화원을 창건하다','외교 문서인 청방인문표를 작성하다','격황소서를 지어 세상에 이름을 떨치다','구법순례기인 왕오천축국전을 저술하다'], answer:1, exp:'청해진을 설치하고 법화원을 창건한 인물은 장보고입니다. 화왕계는 설총, 청방인문표는 강수, 격황소서는 최치원, 왕오천축국전은 혜초의 작품입니다.'},
{r:3, src:'75회 6번', q:'혜공왕 피살 이후 무열왕계 단절, 진골 귀족들의 왕위 다툼 이후 양길 등 호족 세력이 성장한 시기에 있었던 일로 (가)에 가장 적절한 것은?', choices:['김흠돌의 난이 진압되었어요.','만적이 개경에서 봉기를 도모하였어요.','관료전이 지급되고 녹읍이 폐지되었어요.','김헌창이 웅천주에서 반란을 일으켰어요.','이차돈의 순교를 계기로 불교가 공인되었어요.'], answer:3, exp:'혜공왕 피살(780) 이후 왕위 다툼이 심화되던 시기, 822년 김헌창이 웅천주에서 반란을 일으켰습니다. 김흠돌의 난(681, 신문왕), 녹읍 폐지(689, 신문왕), 이차돈 순교(527, 법흥왕)는 이전 시기입니다.'},
{r:3, src:'75회 8번', q:'연호 인안(무왕), 연호 대흥(문왕), 연호 건흥(인수)이 등장하는 국가에 대한 설명으로 옳은 것은?', choices:['골품에 따라 관등 승진을 제한하였다.','주자감을 설치하여 인재를 양성하였다.','내신좌평 등 6좌평의 관제를 정비하였다.','국경 지역인 양계에 병마사를 파견하였다.','상수리 제도를 통해 지방 세력을 견제하였다.'], answer:1, exp:'인안(무왕), 대흥(문왕), 건흥(선왕) 등의 연호를 사용한 국가는 발해입니다. 발해는 주자감을 설치하여 인재를 양성하였고, 문적원을 두었으며, 5경 15부 62주의 지방 행정 제도를 갖추었습니다.'},
{r:3, src:'76회 5번', q:'일본 도다이사 쇼소인에서 발견된 (가) 촌락 문서(서원경 부근 4개 촌락, 인구·토지·소·말·뽕나무·잣나무 기록). (가) 국가의 경제 상황으로 가장 적절한 것은?', choices:['경성과 경원에 무역소를 두었다.','솔빈부의 말을 특산품으로 수출하였다.','서적점, 다점 등의 관영 상점을 운영하였다.','청해진을 중심으로 해상 무역이 번성하였다.','특수 행정 구역인 소에서 여러 물품을 생산하였다.'], answer:3, exp:'통일신라의 민정문서(촌락 문서)는 서원경(청주) 부근 4개 촌락의 상황을 기록한 것으로, 조세 수취와 노동력 동원에 활용되었습니다. 청해진 해상 무역(장보고)은 통일신라의 특징입니다. 서적점·다점은 고려의 관영 상점입니다.'},
{r:3, src:'76회 8번', q:'고구려 계승의식을 드러낸 최치원의 표문에서 "(가)의 왕자 대봉예가 자신들의 자리를 신라 위에 있게 해 달라고 청하였다"고 언급된 (가) 국가에 대한 설명으로 옳은 것은?', choices:['역사서인 유기와 신집을 편찬하였다.','내신좌평, 내두좌평 등 6좌평이 있었다.','5경 15부 62주의 지방 행정 제도를 갖추었다.','도병마사에서 변경의 군사 문제 등을 논의하였다.','골품에 따라 관등 승진, 일상생활 등을 엄격히 제한하였다.'], answer:2, exp:'대봉예(대문예)는 발해의 왕자입니다. 발해는 5경 15부 62주의 지방 행정 제도를 갖추었습니다. 유기·신집은 고구려, 6좌평은 백제, 도병마사는 고려, 골품제는 신라의 특징입니다.'},
{r:3, src:'77회 7번', q:'영역이 5천 리이며, 5경과 15부를 두었다. 서쪽으로 중국, 남쪽으로 신라, 북쪽으로 거란, 동쪽으로 일본. 이 국가에 대한 설명으로 옳은 것은?', choices:['12월에 영고라는 제천 행사를 열었다.','주자감을 설치하여 인재를 양성하였다.','군사 조직으로 9서당 10정을 편성하였다.','기인 제도를 실시하여 지방 세력을 견제하였다.','왕족인 부여씨와 8성 귀족이 지배층을 이루었다.'], answer:1, exp:'5경 15부, 동서남북 4개국과의 외교는 발해의 특징입니다. 발해는 주자감(교육 기관), 문적원(문서 관리)을 설치하였습니다. 영고는 부여, 9서당 10정은 신라, 기인 제도는 고려, 부여씨·8성은 백제의 특징입니다.'},
{r:3, src:'예상', q:'통일신라 신문왕의 업적으로 옳지 않은 것은?', choices:['김흠돌 모역 사건으로 귀족 세력을 숙청하였다.','관료전을 지급하고 녹읍을 폐지하였다.','9주 5소경을 정비하고 9서당 10정을 편성하였다.','독서삼품과를 시행하여 관리를 선발하였다.','국학을 설치하여 유학 교육을 강화하였다.'], answer:3, exp:'독서삼품과는 원성왕(788)이 시행하였습니다. 신문왕의 업적: 김흠돌 난 진압, 관료전 지급·녹읍 폐지, 9주 5소경, 9서당 10정, 국학 설치, 만파식적 설화 배경 왕.'},
{r:3, src:'예상', q:'발해가 고구려를 계승하였음을 보여주는 근거로 옳지 않은 것은?', choices:['건국 주도 세력이 고구려 유민이었다.','정혜공주묘의 모줄임 천장 구조와 돌사자상이 고구려 양식을 계승하였다.','일본에 보낸 국서에서 고구려를 계승하였다고 밝혔다.','수도인 상경이 고구려의 평양을 그대로 계승하였다.','발해를 멸망시킨 거란과의 전쟁에서도 고구려 문화가 나타난다.'], answer:3, exp:'발해의 상경 용천부는 당나라 장안성을 모방한 구조입니다. 발해가 고구려를 계승하였음을 보여주는 근거: 고구려 유민 주도, 정혜공주묘의 고구려식 건축, 일본 국서에서 고구려 계승 명시 등입니다.'},
{r:3, src:'예상', q:'원효의 사상에 대한 설명으로 옳은 것은?', choices:['화엄사상을 바탕으로 교종을 통합하고자 하였다.','일심 사상과 화쟁 사상으로 불교 대중화에 기여하였다.','참선과 수행을 통한 깨달음을 강조하는 선종을 도입하였다.','교관겸수를 주장하며 천태종을 개창하였다.','화엄일승법계도를 작성하고 영주 부석사를 창건하였다.'], answer:1, exp:'원효는 일심(一心) 사상과 화쟁(和諍) 사상으로 불교 대중화에 기여하였으며, 아미타 신앙 보급에도 힘썼습니다(나무아미타불). 화엄사상·부석사는 의상, 교관겸수·천태종은 의천(고려), 선종은 도의국사의 특징입니다.'},
{r:3, src:'예상', q:'장보고에 대한 설명으로 옳은 것을 모두 고른 것은?', choices:['청해진을 설치하여 동아시아 무역을 주도하였다.','산동반도에 적산 법화원을 창건하였다.','신라의 왕위 쟁탈전에 개입하다가 암살되었다.','가, 나, 다 모두','나와 다만 옳다'], answer:3, exp:'장보고: ① 청해진 설치(828, 완도)하여 해상 무역 주도 ② 산동반도 적산 법화원 창건(재당 신라인 지원) ③ 왕위 쟁탈전 개입 후 암살(846). 세 가지 모두 옳습니다.'},

{r:4, src:'74회 12번', q:'거란이 사신을 파견하자 낙타 50필을 보냈는데, 갑자기 의심을 일으켜 맹약을 깨고 발해와 지속 화목하다가 침략해 멸망시켰으니 교빙을 끊겠다. 사신 30인을 섬으로 유배, 낙타를 만부교 아래 매어 두어 굶어 죽였다. 이 상황 이후에 있었던 사실로 옳은 것은?', choices:['묘청이 칭제 건원을 주장하였다.','강감찬이 흥화진 전투에서 승리하였다.','서희의 외교로 강동 6주를 획득하였다.','최우가 강화도로 도읍을 옮겨 항전하였다.','윤관이 별무반을 이끌고 동북 9성을 개척하였다.'], answer:2, exp:'거란 낙타를 만부교에서 굶긴 것은 태조 왕건의 만부교 사건(942)입니다. 이후 거란의 1차 침입(993)에서 서희가 외교 담판으로 강동 6주를 획득하였습니다. 귀주대첩(강감찬)은 3차 침입(1019) 후입니다.'},
{r:4, src:'75회 10번', q:'(가) 견훤이 신라 수도에 침입, 신라 왕을 자결하게 함 / (나) 견훤이 고창군을 포위하자 유금필이 공격 허락을 청함. (가)-(나) 사이에 있었던 사실로 옳은 것은?', choices:['신숭겸이 공산 전투에서 전사하였다.','안승이 보덕국의 왕으로 책봉되었다.','흑치상지가 임존성에서 군사를 일으켰다.','최치원이 왕에게 시무 10여 조를 건의하였다.','왕건이 일리천 전투에서 신검에게 승리하였다.'], answer:0, exp:'(가) 927년 견훤의 신라 침입·경애왕 살해 → 같은 해 공산 전투(신숭겸 전사) → (나) 930년 고창 전투. 공산 전투(927)는 (가)와 (나) 사이에 해당합니다. 일리천 전투(936)는 (나) 이후입니다.'},
{r:4, src:'75회 11번', q:'태학조교와 나주목 경학박사를 치하하고 처음으로 12목을 설치하고 지방관에 이어 경학박사와 의학박사를 파견한 (가) 왕에 대한 설명으로 옳은 것은?', choices:['광덕, 준풍 등의 독자적 연호를 사용하였다.','신돈을 중심으로 전민변정 사업을 추진하였다.','청연각과 보문각을 두어 학문 연구를 장려하였다.','정계와 계백료서를 지어 관리의 규범을 제시하였다.','최승로의 시무 28조를 받아들여 통치 체제를 정비하였다.'], answer:4, exp:'12목 설치와 최승로의 시무 28조 수용은 고려 성종(981~997)의 업적입니다. 성종은 또한 국자감 설치, 흑창을 의창으로 개편하였습니다. 광덕·준풍 연호는 광종, 전민변정도감은 공민왕, 정계·계백료서는 태조의 업적입니다.'},
{r:4, src:'76회 12번', q:'야별초를 좌·우별초로 나누어 편성한 (가) 인물에 대한 설명으로 옳은 것은?', choices:['원종을 폐위하고 안경공 창을 즉위시켰다.','9재 학당을 설립하여 유교 교육에 힘썼다.','인사 행정 담당 기구로 정방을 설치하였다.','전민변정도감의 책임자로서 개혁을 이끌었다.','오월에 사신을 보내고 검교태보의 직을 받았다.'], answer:2, exp:'야별초 편성, 정방 설치는 최우(최충헌의 아들)의 업적입니다. 최우는 정방(인사 행정 기구)을 설치하여 권력을 강화하였습니다. 원종 폐위는 임연, 9재 학당은 최충, 전민변정도감은 신돈, 검교태보는 태조 왕건의 업적입니다.'},
{r:4, src:'76회 16번', q:'동(銅)소·철소·자기소·지소·묵소 등의 소에서 별공, 처음으로 화폐를 주조하는 법을 제정하여 해동통보. 이 상황이 나타난 국가의 경제 모습으로 옳은 것은?', choices:['청해진을 설치하여 해상 무역을 전개하였다.','재정 문제를 해결하기 위한 당백전이 발행되었다.','계해약조가 체결되어 세견선의 입항이 허가되었다.','육의전을 제외한 시전 상인의 금난전권이 폐지되었다.','예성강 하구의 벽란도가 국제 무역항으로 번성하였다.'], answer:4, exp:'소(所)는 고려의 특수 행정 구역으로 수공업품을 생산하였습니다. 해동통보는 고려 숙종이 발행한 화폐입니다. 고려의 경제: 벽란도(국제 무역항), 소를 이용한 깊이갈이, 전시과 제도. 당백전은 조선 흥선대원군, 계해약조는 조선 세종, 금난전권 폐지는 조선 정조의 정책입니다.'},

{r:4, src:'예상', q:'고려 광종의 업적으로 옳은 것은?', choices:['훈요 10조를 지어 후대 왕에게 남겼다.','노비안검법과 과거제를 실시하였다.','최승로의 시무 28조를 수용하였다.','전국에 12목을 설치하고 지방관을 파견하였다.','전시과 제도를 처음으로 시행하였다.'], answer:1, exp:'고려 광종(949~975): 노비안검법 시행(호족 세력 약화), 쌍기의 건의로 과거제 도입, 광덕·준풍 독자 연호 사용, 공신·호족 세력 숙청. 훈요 10조는 태조, 시무 28조 수용·12목 설치는 성종, 전시과는 경종의 업적입니다.'},

{r:4, src:'예상', q:'무신집권기에 대한 설명으로 옳지 않은 것은?', choices:['정중부, 이의방이 정변을 일으켰다.','최충헌이 교정도감을 두어 국정을 총괄하였다.','최우가 정방을 설치하여 인사권을 장악하였다.','삼별초가 몽골과의 강화에 반발하여 항쟁하였다.','쌍기의 건의로 과거제가 처음 도입되었다.'], answer:4, exp:'쌍기의 건의로 과거제가 도입된 것은 광종(958) 때로 무신집권기(1170~1270) 이전의 일입니다. 무신집권기: 정중부의 정변(1170), 최충헌의 교정도감, 최우의 정방, 삼별초 항쟁(1270~1273).'},

{r:4, src:'예상', q:'고려의 문화유산에 대한 설명으로 옳은 것은?', choices:['「직지심체요절」은 세계 최초의 금속활자 인쇄본으로 청주 흥덕사에서 간행되었다.','경천사지 10층 석탑은 신라의 영향을 받아 만들어졌다.','부석사 무량수전은 고려 시대에 창건된 주심포 양식의 건물이다.','의천은 조계종을 개창하고 수선사 결사 운동을 전개하였다.','월정사 팔각구층석탑은 고구려 탑의 양식을 계승하였다.'], answer:0, exp:'「직지심체요절」은 1377년 청주 흥덕사에서 간행된 세계 최초의 금속활자 인쇄본입니다(현재 프랑스 국립도서관 소장). 경천사지 10층 석탑은 원나라 영향, 의천은 천태종 개창, 지눌이 조계종·수선사 결사 운동을 전개하였습니다.'},

{r:5, src:'75회 19번', q:'처음에 공신 배극렴·조준·정도전이 세자를 세울 것을 청하면서 어린 이방석을 왕세자로 삼았다는 자료를 활용한 탐구 활동으로 가장 적절한 것은?', choices:['제1차 왕자의 난이 일어난 이유를 찾아본다.','수양대군이 정권을 장악하는 과정을 조사한다.','사림이 동인과 서인으로 나뉘게 된 계기를 파악한다.','폐모살제 등을 구실로 반정을 일으킨 세력을 검색한다.','허적과 윤휴 등 남인이 대거 축출되는 사건을 알아본다.'], answer:0, exp:'이방석이 왕세자로 책봉된 것이 1차 왕자의 난(1398)의 직접적 원인이 되었습니다. 이방원(태종)이 정도전·이방석 등을 제거한 사건입니다. 수양대군 계유정난은 세조, 동인·서인 분파는 선조, 인조반정은 광해군 때입니다.'},
{r:5, src:'76회 19번', q:'박연이 만든 편경을 활용하여 궁중 음악인 아악을 정비해 보고자 하오. 이 왕의 재위 시기에 있었던 사실로 옳은 것은?', choices:['훈련 교범인 무예도보통지가 간행되었다.','전통 한의학을 정리한 동의보감이 저술되었다.','음악 이론 등을 집대성한 악학궤범이 완성되었다.','유교 윤리의 보급을 위해 삼강행실도가 편찬되었다.','군정, 재정의 내용을 정리한 만기요람이 만들어졌다.'], answer:3, exp:'박연의 편경과 아악 정비는 세종 때의 일입니다. 세종의 문화 업적: 삼강행실도(유교 윤리 보급), 칠정산(역법), 농사직설, 갑인자. 악학궤범은 성종, 동의보감은 선조·광해군, 무예도보통지는 정조, 만기요람은 순조 때입니다.'},
{r:5, src:'77회 21번', q:'훈련도감 설치를 건의하고 공납의 폐단을 시정하고자 대공수미법을 제안하여 안동 병산 서원에 위패가 봉안된 (가) 인물에 대한 설명으로 옳은 것은?', choices:['기대승과 사단칠정 논쟁을 전개하였다.','소학의 보급과 현량과 실시를 주장하였다.','기축봉사를 올려 명에 대한 의리를 내세웠다.','임진왜란의 상황 등을 담은 징비록을 저술하였다.','최초로 100리 척을 사용하여 동국지도를 제작하였다.'], answer:3, exp:'훈련도감 설치 건의와 대공수미법 제안은 유성룡의 업적입니다. 유성룡은 「징비록」을 저술하였고 서애 서원(안동 병산서원)에 배향되었습니다. 기대승과 사단칠정 논쟁은 이황, 소학·현량과는 조광조, 기축봉사는 정철, 동국지도는 정상기의 업적입니다.'},

{r:6, src:'74회 31번', q:'고부 민란 당시 조병갑 횡포에 맞서 사발통문을 작성하고 전봉준 등 봉기를 전개한 (가) 운동의 탐구 활동으로 가장 적절한 것은?', choices:['삼국 간섭의 결과를 알아본다.','척화비가 건립된 계기를 조사한다.','전주 화약이 체결되는 과정을 살펴본다.','영국이 거문도를 점령한 목적을 분석한다.','외규장각 도서가 약탈된 배경을 찾아본다.'], answer:2, exp:'고부 민란에서 시작된 동학 농민 운동은 황토현·황룡촌 전투 → 전주성 점령 → 전주 화약 체결 → 집강소 설치로 이어졌습니다. 전주 화약은 동학 농민 운동의 핵심 사건입니다.'},
{r:6, src:'74회 36번', q:'경성보고(독립운동 관련 판결문)에서 장채극이 서울 보성고보 학생으로 독립선언서를 배포하고 시위 참여, 국민 대회 취지서 배포한 (가) 운동에 대한 설명으로 옳은 것은?', choices:['정우회 선언의 영향을 받았다.','통감부의 탄압과 방해로 중단되었다.','순종의 인산일을 기회로 삼아 추진되었다.','전개 과정에서 일제가 재암리 학살 등을 자행하였다.','성진회와 각 학교 독서회에 의해 전국적으로 확산되었다.'], answer:2, exp:'독립선언서 배포, 국민 대회 취지서는 6·10 만세운동(1926)과 관련됩니다. 6·10 만세운동은 순종의 인산일(장례일)을 기회로 삼아 추진되었습니다. 정우회 선언은 신간회 결성 배경, 성진회·독서회는 광주학생운동의 배경입니다.'},
{r:6, src:'75회 28번', q:'김옥균 등이 청의 자주권 침해에 분노하여 일본 공사와 (가)를 일으켜 실패하였다. (가) 사건에 대한 설명으로 옳은 것은?', choices:['개혁 추진 기구로 교정청이 설치되었다.','전개 과정에서 홍범 14조가 반포되었다.','통리기무아문이 신설되는 배경이 되었다.','김기수가 수신사로 파견되는 결과를 가져왔다.','청일 간에 톈진 조약이 체결되는 계기가 되었다.'], answer:4, exp:'김옥균·홍영식 등이 주도한 갑신정변(1884)은 실패 후 한성 조약(조선-일본)과 톈진 조약(청-일)이 체결되었습니다. 교정청은 동학 농민 운동 이후, 통리기무아문은 임오군란 이후 신설되었습니다.'},
{r:6, src:'76회 32번', q:'독립관에서 "조선의 급선무는 인민의 교육이다" 토론회를 개최한 (가) 단체의 활동으로 옳은 것은?', choices:['고종 강제 퇴위 반대 운동을 주도하였다.','만세보를 발행하여 민족의식을 고취하였다.','파리 강화 회의에 독립 청원서를 제출하였다.','관민 공동회를 개최하여 헌의 6조를 결의하였다.','계몽 서적을 보급하기 위해 태극 서관을 운영하였다.'], answer:3, exp:'독립관 토론회, 독립신문, 독립문 건립 등은 독립협회(1896~1898)의 활동입니다. 독립협회는 만민공동회·관민공동회를 개최하여 헌의 6조를 결의하였습니다. 태극 서관은 신민회, 만세보는 천도교의 기관지입니다.'},
{r:6, src:'77회 33번', q:'자신회(오적 처단 목적), 중명전(조약 강제 체결 장소), 민영환(조약에 항거하여 자결). 이 자료에 나타난 조약에 대한 설명으로 옳은 것은?', choices:['청의 알선으로 체결이 추진되었다.','통감부가 설치되는 결과를 가져왔다.','천주교 포교를 허용하는 근거가 되었다.','스티븐스가 외교 고문으로 부임하는 계기가 되었다.','대한 제국 군대의 해산을 규정하는 내용이 포함되어 있다.'], answer:1, exp:'오적 처단, 민영환 자결, 중명전 등은 을사늑약(1905) 관련 자료입니다. 을사늑약으로 외교권이 박탈되고 통감부가 설치되었습니다. 1차 한일협약에 스티븐스 고문, 정미조약(1907)에 군대 해산 조항이 포함되었습니다.'},
{r:6, src:'예상', q:'강화도 조약(1876)의 내용으로 옳지 않은 것은?', choices:['부산·원산·인천 3개 항구를 개항하였다.','일본의 해안 측량권을 허용하였다.','관세 자주권을 인정받았다.','조선이 자주 독립국임을 확인하였다.','일본 외교관의 치외 법권을 인정하였다.'], answer:2, exp:'강화도 조약은 불평등 조약으로 무관세 조항이 포함되어 관세 자주권이 없었습니다. 조선이 관세 자주권을 처음 인정받은 것은 조미수호통상조약(1882)에서입니다. 강화도 조약의 주요 내용: 3개 항구 개항, 해안 측량권, 치외 법권, 자주국 확인.'},
{r:6, src:'예상', q:'동학 농민 운동(1894)의 전개 순서로 옳은 것은?', choices:['고부 민란 → 황토현 전투 → 전주 화약 → 집강소 설치 → 우금치 전투','고부 민란 → 전주 화약 → 황토현 전투 → 우금치 전투 → 집강소 설치','황토현 전투 → 고부 민란 → 집강소 설치 → 전주 화약 → 우금치 전투','전주 화약 → 고부 민란 → 황토현 전투 → 우금치 전투 → 집강소 설치','고부 민란 → 황토현 전투 → 집강소 설치 → 전주 화약 → 우금치 전투'], answer:0, exp:'동학 농민 운동 전개: ①고부 민란(조병갑 탐학) → ②황토현·황룡촌 전투 → ③전주성 점령·전주화약 → ④집강소 설치·폐정개혁 → ⑤2차 봉기(일본군 경복궁 점령 계기) → ⑥우금치 전투 패배.'},
{r:6, src:'예상', q:'갑오개혁(1차)의 내용으로 옳지 않은 것은?', choices:['군국기무처를 설치하여 개혁을 추진하였다.','과거제를 폐지하였다.','공사 노비제를 혁파하였다.','홍범 14조를 반포하였다.','개국 기년 사용으로 연호를 정하였다.'], answer:3, exp:'홍범 14조는 2차 갑오개혁 때 반포되었습니다. 1차 갑오개혁: 군국기무처 설치, 과거제 폐지, 공사 노비제 혁파, 은본위 화폐, 개국 기년 사용. 2차 갑오개혁: 홍범 14조, 8도→23부, 내각제 시행.'},
{r:6, src:'예상', q:'신민회(1907~1911)의 활동으로 옳지 않은 것은?', choices:['안창호, 양기탁 등이 비밀리에 결성하였다.','태극 서관을 운영하여 계몽 서적을 보급하였다.','대성 학교와 오산 학교를 설립하였다.','독립 의군부를 조직하여 무장 투쟁을 전개하였다.','105인 사건으로 와해되었다.'], answer:3, exp:'독립 의군부는 임병찬이 고종의 밀지를 받아 조직한 단체로 신민회와는 다릅니다. 신민회의 활동: 태극 서관(서적 보급), 대성·오산 학교(민족 교육), 국외 독립군 기지 건설(만주), 105인 사건으로 해산(1911).'},

{r:6, src:'예상', q:'을미사변(1895)에 대한 설명으로 옳은 것은?', choices:['청나라 군인들이 경복궁에 침입하여 명성황후를 시해하였다.','일본 낭인들이 경복궁에 침입하여 명성황후를 시해하였다.','이 사건 이후 바로 을사늑약이 체결되었다.','고종은 이 사건 이후 대한제국을 선포하였다.','이 사건의 배경은 러·일 전쟁의 패배였다.'], answer:1, exp:'을미사변(1895.8)은 일본 공사 미우라 고로의 지휘 아래 일본 낭인들이 경복궁에 침입하여 명성황후를 시해한 사건입니다. 이후 을미개혁(단발령·태양력·건양 연호)이 추진되었고, 의병 운동이 일어났습니다. 고종은 아관 파천(1896) 후 환궁하여 대한제국을 선포(1897)하였습니다.'},

{r:7, src:'74회 38번', q:'의열단(김원봉, 일제 기관 폭탄 투척), 한인애국단(이봉창·윤봉길 의거), 1920년대 봉오동→청산리→간도참변→자유시→미쓰야협정. 1930년대 한국독립군에 대한 설명으로 옳은 것은?', choices:['청산리에서 일본군에 맞서 승리를 거두었다.','미국과 연계하여 국내 진공 작전을 준비하였다.','동북 항일 연군으로 개편되어 유격전을 전개하였다.','쌍성보, 대전자령 전투 등에서 일본군에 승리하였다.','중국 관내에서 결성된 최초의 한인 무장 부대였다.'], answer:3, exp:'한국독립군(지청천 총사령): 쌍성보·대전자령 전투에서 중국 호로군과 함께 승리(북만주). 청산리 대첩은 북로군정서(김좌진), 동북항일연군은 동만주, 국내 진공은 한국광복군, 최초 무장 부대는 조선의용대의 특징입니다.'},
{r:7, src:'75회 37번', q:'박상진 등이 1915년 대구에서 조직한 (가) 단체의 충청도 지부장 김한종이 군자금 모금과 친일 관리 처단을 주도. (가) 단체에 대한 설명으로 옳은 것은?', choices:['군대식 조직을 갖춘 비밀 결사였다.','정우회 선언의 영향으로 결성되었다.','조선 혁명 선언을 활동 지침으로 삼았다.','중국군과 함께 영릉가 전투에서 큰 전과를 올렸다.','만민 공동회를 열어 열강의 이권 침탈을 비판하였다.'], answer:0, exp:'대구, 박상진, 1915년, 군자금 모금·친일 처단은 대한광복회의 특징입니다. 대한광복회는 군대식 조직의 비밀 결사였습니다. 정우회 선언→신간회, 조선 혁명 선언→의열단, 영릉가 전투→조선혁명군, 만민공동회→독립협회의 활동입니다.'},
{r:7, src:'76회 38번', q:'김원봉이 1919년 지린성에서 일제 식민 통치 기관 파괴와 요인 처단을 목표로 윤세주 등과 (가)를 조직. (가) 단체에 대한 설명으로 옳은 것은?', choices:['신흥 강습소를 세워 독립군을 양성하였다.','구미 위원부를 설치하여 외교 활동을 전개하였다.','단원인 이봉창이 일왕 행렬에 폭탄을 투척하였다.','조선 혁명 선언을 통해 이념과 활동 방침을 밝혔다.','조선 총독부에 국권 반환 요구서를 제출하고자 하였다.'], answer:3, exp:'김원봉, 지린성, 1919년, 기관 파괴·요인 처단은 의열단의 특징입니다. 의열단은 신채호의 「조선혁명선언」을 활동 지침으로 삼았습니다. 신흥 강습소는 신민회(이회영), 구미 위원부는 대한민국 임시정부, 이봉창·윤봉길은 한인애국단의 활동입니다.'},
{r:7, src:'77회 38번', q:'조선 민족의 총역량을 집중하여 민족 단일당 결성을 촉진하며 (가)가 조직되었다. 각도 지회가 속속 설치되었으나 민중 대회 준비 중 발각되어 해소되었다. (가) 단체의 활동으로 옳은 것은?', choices:['개벽, 신여성 등의 잡지를 발행하였다.','중추원 개편을 통해 의회 설립을 추진하였다.','군사 조직으로 한인 국방 경위대를 창설하였다.','순종의 인산일을 기회로 만세 운동을 계획하였다.','광주 학생 항일 운동에 진상 조사단을 파견하였다.'], answer:4, exp:'민족 단일당, 지회 설치, 민중 대회, 해소(1931)는 신간회(1927~1931)의 특징입니다. 신간회는 광주학생항일운동(1929)에 진상 조사단을 파견하였습니다. 개벽·신여성은 천도교, 의회 설립은 독립협회, 6·10 만세는 순종 인산일의 특징입니다.'},
{r:7, src:'예상', q:'3·1 운동(1919)에 대한 설명으로 옳지 않은 것은?', choices:['도쿄 유학생들의 2·8 독립선언이 영향을 주었다.','고종의 인산일을 기회로 삼아 추진되었다.','대한민국 임시정부 수립의 계기가 되었다.','일제의 이른바 문화통치 실시의 계기가 되었다.','신간회의 주도로 전국에 확산되었다.'], answer:4, exp:'신간회는 1927년에 결성된 단체로 3·1 운동(1919) 당시에는 존재하지 않았습니다. 3·1 운동: 2·8 독립선언 영향, 고종 인산일, 임시정부 수립 계기, 일제 문화통치(이른바) 실시의 배경.'},
{r:7, src:'예상', q:'1910년대 일제의 무단통치 정책으로 옳은 것은?', choices:['회사령을 폐지하여 기업 설립을 자유화하였다.','헌병 경찰이 즉결 처분과 태형을 실시하였다.','농촌 진흥 운동으로 자력갱생을 강조하였다.','황국신민서사 암송과 창씨개명을 강요하였다.','신간회를 허용하는 등 문화통치를 표방하였다.'], answer:1, exp:'1910년대 무단통치: 헌병 경찰제, 즉결 처분, 태형, 회사령(허가제), 토지조사사업, 조선태형령. 회사령 폐지는 1920년대, 농촌 진흥 운동은 1930년대 초, 황국신민서사·창씨개명은 1930년대 후반, 문화통치는 1920년대의 특징입니다.'},

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  }

  // Calculate how many from each range
  const totalWeight = ranges.reduce((s, r) => s + RANGE_WEIGHTS[r], 0);
  const alloc = {};
  let allocated = 0;
  for (const r of ranges) {
    alloc[r] = Math.max(1, Math.round(RANGE_WEIGHTS[r] / totalWeight * TOTAL));
    allocated += alloc[r];
  }
  // Adjust to exactly TOTAL
  while (allocated > TOTAL) {
    const maxR = ranges.reduce((a, b) => alloc[a] > alloc[b] ? a : b);
    alloc[maxR]--;
    allocated--;
  }
  while (allocated < TOTAL) {
    const minR = ranges.reduce((a, b) => poolByRange[a].length > alloc[a] && alloc[a] <= alloc[b] ? a : b);
    alloc[minR]++;
    allocated++;
  }

  // Collect questions (in range order = historical order)
  const collected = [];
  for (const r of ranges) {
    const pool = poolByRange[r];
    const need = Math.min(alloc[r], pool.length);
    for (let i = 0; i < need; i++) collected.push(pool[i]);
  }

  // If total < 50, pad with more from available ranges
  if (collected.length < TOTAL) {
    const extra = TOTAL - collected.length;
    const usedIds = new Set(collected.map((_,i)=>i)); // primitive - just shuffle again
    const fallback = shuffle(QUESTIONS.filter(q => ranges.includes(q.r)));
    for (const q of fallback) {
      if (collected.length >= TOTAL) break;
      if (!collected.includes(q)) collected.push(q);
    }
  }

  quizQuestions = collected.slice(0, TOTAL);
  currentIdx = 0;
  score = 0;

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('live-score').textContent = 0;
  renderQ();
}

function renderQ() {
  answered = false;
  const q = quizQuestions[currentIdx];
  const total = quizQuestions.length;

  document.getElementById('cur-q').textContent = currentIdx + 1;
  document.getElementById('prog-fill').style.width = ((currentIdx + 1) / total * 100) + '%';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('btn-next').style.display = 'none';

  // Range badge
  document.getElementById('q-range-badge').innerHTML =
    RANGE_NAMES[q.r] + ' <span class="q-source" id="q-src">[' + q.src + ']</span>';

  // Source box (if q has srcbox) - for now use q.sbox if defined
  const srcBox = document.getElementById('q-srcbox');
  if (q.sbox) { srcBox.style.display = ''; srcBox.innerHTML = q.sbox; }
  else srcBox.style.display = 'none';

  document.getElementById('q-text').textContent = q.q;

  // Choices - shuffle answer position
  const correct = q.choices[q.answer];
  const wrong = shuffle(q.choices.filter((_, i) => i !== q.answer));
  const pool = shuffle([correct, ...wrong]);
  const newAns = pool.indexOf(correct);

  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'choices';
  const labels = ['①','②','③','④','⑤'];
  pool.forEach((text, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-num">${labels[i]}</span><span>${text}</span>`;
    btn.onclick = () => handleChoice(i, btn, div, newAns, q);
    div.appendChild(btn);
  });
  area.appendChild(div);
}

function handleChoice(idx, btn, div, correctIdx, q) {
  if (answered) return;
  answered = true;
  const btns = div.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  btns[correctIdx].classList.add('correct');
  if (idx !== correctIdx) btn.classList.add('wrong');
  else score++;
  document.getElementById('live-score').textContent = score;
  showExp(q.exp);
}

function showExp(text) {
  const el = document.getElementById('explanation');
  document.getElementById('exp-text').textContent = text;
  el.style.display = 'block';
  const nb = document.getElementById('btn-next');
  nb.style.display = 'block';
  nb.textContent = currentIdx < quizQuestions.length - 1 ? '다음 문제 →' : '결과 보기 🏁';
  nb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function nextQuestion() {
  currentIdx++;
  if (currentIdx >= quizQuestions.length) showResult();
  else { renderQ(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';
  const total = quizQuestions.length;
  const pct = Math.round(score / total * 100);
  document.getElementById('res-score').textContent = score;
  document.getElementById('bc-cnt').textContent = score;
  document.getElementById('bw-cnt').textContent = total - score;
  setTimeout(() => {
    document.getElementById('bar-c').style.width = (score / total * 100) + '%';
    document.getElementById('bar-w').style.width = ((total - score) / total * 100) + '%';
  }, 200);
  let icon, title, msg, cls;
  if (pct >= 90) { icon='🏆'; title='목표 달성!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n78회 심화 100점도 노려볼 수 있습니다!`; cls='score-excellent'; }
  else if (pct >= 80) { icon='🎯'; title='거의 다 왔어요!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n조금만 더 복습하면 90점 목표 달성!`; cls='score-good'; }
  else if (pct >= 60) { icon='📖'; title='더 공부해요!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n틀린 단원을 중심으로 재도전해 보세요.`; cls='score-ok'; }
  else { icon='💪'; title='다시 도전!'; msg=`${total}문제 중 ${score}문제 정답 (${pct}%)\n개념 노트를 먼저 복습하고 다시 도전!`; cls='score-low'; }
  document.getElementById('res-icon').textContent = icon;
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-score-wrap').className = 'result-score ' + cls;
}

function goHome() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
}
</script>
